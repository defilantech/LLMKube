apiVersion: v1
entries:
  foreman:
  - apiVersion: v2
    appVersion: 0.8.25
    created: "2026-07-01T22:36:35.847996802Z"
    description: 'Foreman is an opt-in add-on for LLMKube that schedules agentic workloads
      (Workload, AgenticTask) across a fleet of nodes (FleetNode). Installing LLMKube
      alone does not install or require Foreman. Foreman is a SIBLING chart to llmkube,
      not a subchart: install llmkube first (helm install llmkube defilantech/llmkube),
      then install foreman alongside it. They share no Helm relationship at packaging
      or install time; the only coupling is that the foreman-operator''s RBAC reads
      inference.llmkube.dev CRDs that llmkube installs. '
    digest: 4ec409827c1ec1b7f68e923e56beba0796592571d5ca7af1e3e4ea51950dc56b
    home: https://github.com/defilantech/LLMKube
    keywords:
