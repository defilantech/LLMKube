# GoReleaser configuration for LLMKube CLI
# https://goreleaser.com/customization/

version: 2

before:
  hooks:
    # Ensure dependencies are tidy
    - go mod tidy
    # Note: Tests run in separate CI workflow (test.yml) before release is triggered

builds:
  - id: llmkube-cli
    main: ./cmd/cli
    binary: llmkube

    # Set version information at build time
    ldflags:
      - -s -w
      - -X github.com/defilantech/llmkube/pkg/cli.Version={{.Version}}
      - -X github.com/defilantech/llmkube/pkg/cli.GitCommit={{.FullCommit}}
      - -X github.com/defilantech/llmkube/pkg/cli.BuildDate={{.Date}}

    # Build for multiple platforms
    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64

    # Ignore certain combinations
    ignore:
      - goos: windows
        goarch: arm64

    env:
      - CGO_ENABLED=0

  - id: llmkube-controller
    main: ./cmd/main.go
    binary: manager

    # Only build for Linux (container deployment)
    goos:
      - linux

    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0

  - id: llmkube-metal-agent
    main: ./cmd/metal-agent
    binary: llmkube-metal-agent

    # Set version information at build time
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.GitCommit={{.FullCommit}}
      - -X main.BuildDate={{.Date}}

    # macOS only (Metal is macOS-specific)
    goos:
      - darwin

    goarch:
      - arm64  # M1/M2/M3/M4 (Apple Silicon)
      - amd64  # Intel Macs (Metal 2+)

    env:
      - CGO_ENABLED=0

  - id: llmkube-foreman-operator
    main: ./cmd/foreman-operator
    binary: foreman-operator

    # Linux containers only (the foreman-operator runs in-cluster).
    goos:
      - linux

    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0

  - id: llmkube-foreman-agent
    main: ./cmd/foreman-agent
    binary: foreman-agent

    # Set version information at build time.
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.GitCommit={{.FullCommit}}
      - -X main.BuildDate={{.Date}}

    # linux: the in-cluster foreman-agent Pod (consumed by the docker
    # images below). darwin: the M5 Max + Mac Studio native agents, shipped
    # as a release archive so Mac bootstraps and AgentRelease self-update
    # artifacts can be download-based instead of build-from-source.
    goos:
      - linux
      - darwin

    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0

  - id: llmkube-router-proxy
    main: ./cmd/router-proxy
    binary: router-proxy

    # Linux containers only (the controller spawns the router-proxy
    # in-cluster for ModelRouter resources).
    goos:
      - linux

    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0

archives:
  - id: llmkube-cli
    ids:
      - llmkube-cli

    # Archive name template
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

    # Files to include in archive
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - examples/gpu-quickstart/*

    # Format by OS
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: llmkube-metal-agent
    ids:
      - llmkube-metal-agent

    # Archive name template
    name_template: "{{ .ProjectName }}-metal-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

    # Files to include
    files:
      - LICENSE
      - README.md
      - examples/metal-quickstart/*
      - deployment/macos/*

  - id: llmkube-foreman-agent
    ids:
      - llmkube-foreman-agent

    # Archive name template. Produces darwin (Mac native agents) and linux
    # (edge nodes) archives; the linux foreman-agent Pod still ships as a
    # ghcr image via the dockers_v2 section below.
    name_template: "{{ .ProjectName }}-foreman-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

    # Files to include
    files:
      - LICENSE
      - README.md
      - deployment/macos/*
      - deployment/linux/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# dockers_v2 builds one multi-arch manifest per image natively (buildx),
# replacing the old per-arch `dockers` entries + `docker_manifests`. The
# binaries are staged per platform under $TARGETPLATFORM in the build
# context, so the Dockerfiles COPY from "$TARGETPLATFORM/<binary>".
dockers_v2:
  - id: controller
    ids:
      - llmkube-controller
    images:
      - "ghcr.io/defilantech/llmkube-controller"
    tags:
      - "{{ .Version }}"
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

  - id: foreman-operator
    ids:
      - llmkube-foreman-operator
    images:
      - "ghcr.io/defilantech/llmkube-foreman-operator"
    tags:
      - "{{ .Version }}"
    dockerfile: Dockerfile.foreman-operator.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "llmkube-foreman-operator"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

  - id: foreman-agent
    ids:
      - llmkube-foreman-agent
    images:
      - "ghcr.io/defilantech/llmkube-foreman-agent"
    tags:
      - "{{ .Version }}"
    dockerfile: Dockerfile.foreman-agent.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "llmkube-foreman-agent"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

  - id: router-proxy
    ids:
      - llmkube-router-proxy
    images:
      - "ghcr.io/defilantech/llmkube-router-proxy"
    tags:
      - "{{ .Version }}"
    dockerfile: Dockerfile.router-proxy.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "llmkube-router-proxy"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github

  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

  groups:
    - title: "New Features"
      regexp: "^feat:"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix:"
      order: 1
    - title: "Performance Improvements"
      regexp: "^perf:"
      order: 2
    - title: "GPU & Observability"
      regexp: "^gpu:|^obs:"
      order: 3
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: defilantech
    name: LLMKube

  # Release name template
  name_template: "v{{.Version}}"

  # Draft release first (can be published manually)
  draft: false

  # Create release even if tag already exists
  replace_existing_draft: true

  # Keep Release Please's changelog, just add assets
  mode: keep-existing

  # Footer with installation instructions (Release Please provides the changelog)
  footer: |
    ---

    ## Installation

    ### Homebrew (Recommended for macOS)
    ```bash
    brew install defilantech/tap/llmkube
    ```

    ### Install Script (Linux/macOS)
    ```bash
    curl -sSL https://raw.githubusercontent.com/defilantech/LLMKube/main/install.sh | bash
    ```

    ### Manual Download

    **macOS**
    ```bash
    # ARM64 (Apple Silicon)
    curl -L https://github.com/defilantech/LLMKube/releases/download/v{{ .Version }}/LLMKube_{{ .Version }}_darwin_arm64.tar.gz | tar xz
    sudo mv llmkube /usr/local/bin/

    # AMD64
    curl -L https://github.com/defilantech/LLMKube/releases/download/v{{ .Version }}/LLMKube_{{ .Version }}_darwin_amd64.tar.gz | tar xz
    sudo mv llmkube /usr/local/bin/
    ```

    **Linux**
    ```bash
    # AMD64
    curl -L https://github.com/defilantech/LLMKube/releases/download/v{{ .Version }}/LLMKube_{{ .Version }}_linux_amd64.tar.gz | tar xz
    sudo mv llmkube /usr/local/bin/

    # ARM64
    curl -L https://github.com/defilantech/LLMKube/releases/download/v{{ .Version }}/LLMKube_{{ .Version }}_linux_arm64.tar.gz | tar xz
    sudo mv llmkube /usr/local/bin/
    ```

    **Windows**: Download the `.zip` file and add `llmkube.exe` to your PATH.

    ### Verify Installation
    ```bash
    llmkube version
    ```

    **Full Changelog**: [CHANGELOG.md](https://github.com/defilantech/LLMKube/blob/main/CHANGELOG.md)

# Homebrew tap. brews/formulas were deprecated in GoReleaser v2.16 in favor
# of homebrew_casks, which uses cask stanzas (binaries) rather than the
# formula install/test DSL.
homebrew_casks:
  - name: llmkube
    # Only include the CLI archive (not Metal agent)
    ids:
      - llmkube-cli
    binaries:
      - llmkube
    repository:
      owner: defilantech
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    description: "GPU-accelerated Kubernetes operator for local LLM inference"
    homepage: "https://github.com/defilantech/LLMKube"
    # The released CLI binary is not notarized; strip the quarantine xattr so
    # Gatekeeper does not block it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/llmkube"]
          end

# Metadata
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
