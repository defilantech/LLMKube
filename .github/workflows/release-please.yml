name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write  # Required for pushing to GHCR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Publish Homebrew formula
        # GoReleaser no longer manages the tap (its cask replacement is
        # macOS-only). Publish a cross-platform binary formula from the
        # release checksums so `brew install defilantech/tap/llmkube` works on
        # macOS and Linux and tracks every release (#1039 / #1040).
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: ./hack/publish-homebrew-formula.sh "$VERSION" dist/checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*

  trivy-scan:
    needs:
      - release-please
      - goreleaser
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/defilantech/llmkube-controller:${{ needs.release-please.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan foreman-operator
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/defilantech/llmkube-foreman-operator:${{ needs.release-please.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan foreman-agent
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/defilantech/llmkube-foreman-agent:${{ needs.release-please.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan router-proxy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/defilantech/llmkube-router-proxy:${{ needs.release-please.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  release-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.13.0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Sync Chart CRDs Before Packaging
        run: make chart-crds

      - name: Log in to GHCR for Helm OCI
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | helm registry login ghcr.io --username "$GHCR_USER" --password-stdin

      - name: Package and push charts to GHCR (OCI)
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          OCI_REPO: oci://ghcr.io/defilantech/charts
        run: |
          for chart in llmkube foreman; do
            helm package "charts/$chart" --destination dist-charts
            helm push "dist-charts/$chart-${VERSION}.tgz" "$OCI_REPO"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  publish-coder-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # The coder image (llmkube-foreman-agent-coder) is built in the separate
      # llmkube-runtimes repo, triggered by a coder-v<version> tag. Create that
      # tag on every release so its coder image publishes automatically, then
      # verify it lands (#932). Requires RUNTIMES_TOKEN: a PAT or GitHub App
      # token with contents:write on llmkube-runtimes (needed both to push the
      # tag and to trigger the downstream workflow — the default GITHUB_TOKEN
      # cannot do cross-repo writes and would not fire the tag-triggered build).
      # Without the secret this job is a warning-only no-op, so releases still
      # succeed until it is provisioned.
      - name: Gate on cross-repo token
        id: gate
        env:
          RUNTIMES_TOKEN: ${{ secrets.RUNTIMES_TOKEN }}
        run: |
          if [ -z "$RUNTIMES_TOKEN" ]; then
            echo "::warning::RUNTIMES_TOKEN not set; skipping automatic coder-image publish for v${{ needs.release-please.outputs.version }}. Add the secret (contents:write on llmkube-runtimes) to automate, or push coder-v${{ needs.release-please.outputs.version }} manually (#932)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag llmkube-runtimes to build the coder image
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RUNTIMES_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          repo=defilantech/llmkube-runtimes
          tag="coder-v${VERSION}"
          if gh api "repos/${repo}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists in ${repo}; not recreating"
          else
            sha=$(gh api "repos/${repo}/commits/main" --jq .sha)
            gh api "repos/${repo}/git/refs" -f ref="refs/tags/${tag}" -f sha="${sha}"
            echo "created ${repo}@${tag} -> ${sha}"
          fi

      - name: Verify coder image published
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          image=defilantech/llmkube-foreman-agent-coder
          for i in $(seq 1 45); do
            token=$(curl -sSf "https://ghcr.io/token?scope=repository:${image}:pull" | jq -r .token)
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H 'Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json' \
              "https://ghcr.io/v2/${image}/manifests/${VERSION}")
            if [ "${code}" = "200" ]; then
              echo "coder image ${image}:${VERSION} is published"
              exit 0
            fi
            echo "waiting for ${image}:${VERSION} (attempt ${i}/45, http ${code})"
            sleep 40
          done
          echo "::error::coder image ${image}:${VERSION} not published within ~30m; check the build-coder run in llmkube-runtimes (#932)"
          exit 1
