name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Catch newly-disclosed vulnerabilities in dependencies even when the
    # repo has no other changes. Runs weekly on Monday at 07:00 UTC.
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@d1f380186385b4f64e00313f31743df8e4b89a77 # v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...
