name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip3 install jsonschema pyyaml

      - name: Validate samples against CRD schemas
        run: make validate-samples

      - name: Running Tests
        run: |
          go mod tidy
          make test

      - name: Upload coverage to Codecov
        # make test writes cover.out via `go test -coverprofile`.
        # Do not fail CI if Codecov is unreachable.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cover.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Metal Agent (compile check)
        run: GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/metal-agent
