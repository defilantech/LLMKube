name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip3 install jsonschema pyyaml

      - name: Validate samples against CRD schemas
        run: make validate-samples

      - name: Running Tests
        run: |
          go mod tidy
          make test

      - name: Upload coverage to Codecov
        # make test writes cover.out via `go test -coverprofile`.
        # Do not fail CI if Codecov is unreachable.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cover.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Metal Agent (compile check)
        run: GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/metal-agent
