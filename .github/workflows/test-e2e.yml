name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu (kind, default storage)
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e

  test-e2e-longhorn:
    name: Run on Ubuntu (kind + Longhorn, restrictive storage)
    runs-on: ubuntu-latest
    # Best-effort while the Longhorn-in-CI setup is hardened. The default
    # kind job above remains the merge gate. This job catches restrictive-
    # storage-class regressions (refs #418, #420) and will be promoted to
    # required once stable.
    continue-on-error: true
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Longhorn host prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y open-iscsi nfs-common
          sudo systemctl enable --now iscsid

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Pre-create kind cluster with Longhorn host mounts
        env:
          KIND_CLUSTER: llmkube-test-e2e
        run: |
          # /lib/modules is the canonical Longhorn-on-kind extraMount.
          # /sys must NOT be mounted from host; it breaks kind's systemd init
          # ("could not find a log line that matches Reached target Multi-User System").
          cat <<EOF > /tmp/kind-longhorn.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: ${KIND_CLUSTER}
          nodes:
            - role: control-plane
              extraMounts:
                - hostPath: /lib/modules
                  containerPath: /lib/modules
                  readOnly: true
          EOF
          kind create cluster --config /tmp/kind-longhorn.yaml

      - name: Install Longhorn and set as default storage class
        run: |
          helm repo add longhorn https://charts.longhorn.io
          helm repo update
          kubectl create namespace longhorn-system
          helm install longhorn longhorn/longhorn \
            --namespace longhorn-system \
            --set persistence.defaultClass=true \
            --set persistence.defaultClassReplicaCount=1 \
            --set defaultSettings.defaultDataLocality=best-effort \
            --wait --timeout 10m

      - name: Verify Longhorn ready and default class
        run: |
          kubectl -n longhorn-system get pods
          kubectl get storageclass
          # Demote any other default classes (kind ships standard as default)
          for sc in $(kubectl get storageclass -o name | grep -v longhorn); do
            kubectl patch "$sc" -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}' || true
          done
          kubectl get storageclass

      - name: Running Test e2e against Longhorn-backed cluster
        env:
          # Tells the e2e suite to skip tests that require multi-RWO
          # behavior the local-path-provisioner permits but Longhorn does
          # not (notably the cache-inspect path that spawns a second pod
          # against the same RWO PVC the Deployment also wants).
          LLMKUBE_E2E_LONGHORN: "true"
        run: |
          go mod tidy
          make test-e2e

  test-e2e-openshift:
    name: Run on Ubuntu (MicroShift, OpenShift SCC)
    runs-on: ubuntu-latest
    # Best-effort while the MicroShift-in-CI setup is hardened. The
    # default kind job above remains the merge gate. This job catches
    # OpenShift SCC admission regressions (refs #418, #419, #421) and
    # will be promoted to required once stable.
    continue-on-error: true
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Start runner-local container registry
        run: |
          docker run -d --restart=always -p 5000:5000 --name local-registry registry:2
          # Wait for the registry to accept traffic before we try to push.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/v2/ >/dev/null; then
              echo "local registry ready"; break
            fi
            sleep 1
          done

      - name: Install MicroShift
        uses: container-tools/microshift-action@v0.3.0
        with:
          microshift-version: "4.18"

      - name: Verify MicroShift ready and SCC available
        run: |
          kubectl get nodes
          kubectl get clusterrole | grep -i scc || true
          kubectl get securitycontextconstraints restricted-v2 -o name

      - name: Configure cri-o to trust runner-local registry
        run: |
          sudo mkdir -p /etc/containers/registries.conf.d
          sudo tee /etc/containers/registries.conf.d/99-llmkube-ci.conf >/dev/null <<EOF
          [[registry]]
          location = "localhost:5000"
          insecure = true
          EOF
          sudo systemctl restart crio || sudo systemctl restart microshift

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build and push controller image to runner-local registry
        env:
          IMG: localhost:5000/llmkube-controller:ci-${{ github.sha }}
        run: |
          make docker-build IMG="${IMG}"
          docker push "${IMG}"

      - name: Install LLMKube via Helm with OpenShift preset
        env:
          IMG_REPO: localhost:5000/llmkube-controller
          IMG_TAG: ci-${{ github.sha }}
        run: |
          kubectl create namespace llmkube-system
          helm install llmkube ./charts/llmkube \
            -n llmkube-system \
            -f charts/llmkube/values-openshift.yaml \
            --set controllerManager.image.repository="${IMG_REPO}" \
            --set controllerManager.image.tag="${IMG_TAG}" \
            --wait --timeout 5m
          kubectl -n llmkube-system get pods

      - name: Running Test e2e against MicroShift cluster
        env:
          # Tells the e2e suite to skip kind-specific BeforeSuite steps
          # (docker-build + LoadImageToKindClusterWithName) and to run the
          # OpenShift-only SCC admission spec. The image is already built
          # and Helm-deployed via the steps above.
          LLMKUBE_E2E_OPENSHIFT: "true"
          # MicroShift ships its own service-serving certs; skip the
          # cert-manager install that BeforeSuite would otherwise attempt.
          CERT_MANAGER_INSTALL_SKIP: "true"
        run: |
          go mod tidy
          go test -tags=e2e ./test/e2e/ -v -ginkgo.v
