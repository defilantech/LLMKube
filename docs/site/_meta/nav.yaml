# Sidebar navigation for llmkube.com/docs.
#
# This file is the source of truth for the docs site sidebar. The llmkube-web
# build pipeline reads this YAML and renders the sidebar from it. Order here is
# render order on the site.
#
# Schema:
#   sections:
#     - title: <section heading>
#       items:
#         - label: <link text>
#           slug: <path under /docs/>          # required for live pages
#           file: <path under docs/site/>      # the .md file to render
#           status: real | stub                # optional, defaults to real
#
# A `status: stub` entry renders a "this page is in progress" placeholder
# (using llmkube-web's DocStub component) until the markdown is ported.
# Once the markdown lands, drop the status field.

sections:
  - title: Getting Started
    items:
      - label: Overview
        slug: ""
        file: index.md
      - label: Install in 5 minutes
        slug: getting-started
        file: getting-started/index.md
      - label: Quickstart on Minikube
        slug: quickstart-minikube
        file: getting-started/minikube.md
        status: stub

  - title: Concepts
    items:
