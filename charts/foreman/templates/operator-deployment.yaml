{{- if .Values.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "foreman.fullname" . }}-operator
  namespace: {{ include "foreman.namespace" . }}
  labels:
    {{- include "foreman.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "foreman.operator.labels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.operator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "foreman.operator.labels" . | nindent 8 }}
        {{- with .Values.operator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "foreman.operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "foreman.operator.image" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /foreman-operator
          args:
            {{- if .Values.operator.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.operator.health.port }}
            {{- if .Values.operator.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.operator.metrics.port }}
            {{- end }}
            - --zap-log-level={{ .Values.operator.logLevel }}
            # Cluster-wide sovereignty kill switch for cloud-proxy
            # reviewer Agents. False blocks dispatch to any non-local
            # provider regardless of per-Workload opt-in (#540 sibling,
            # v0.2). Air-gapped installs set this false.
            - --allow-cloud-providers={{ .Values.foreman.allowCloudProviders }}
            # Validating admission webhooks for Agent + AgenticTask (#520).
            # Disabled here renders no webhook resources elsewhere; the
            # operator skips the webhook server. Enabled mounts the
            # self-signed serving cert at the default cert dir below.
            - --enable-webhooks={{ .Values.webhook.enabled }}
            {{- if .Values.webhook.enabled }}
            - --webhook-port={{ .Values.webhook.port }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.operator.health.port }}
              protocol: TCP
            {{- if .Values.operator.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.operator.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.operator.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.webhook.enabled }}
            # controller-runtime's default serving-cert location. The
            # self-signed cert Secret is mounted read-only here so the
            # webhook server finds tls.crt + tls.key without extra flags.
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "foreman.webhook.secretName" . }}
        {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
{{- end }}
