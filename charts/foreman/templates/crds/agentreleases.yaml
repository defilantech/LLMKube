{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: agentreleases.foreman.llmkube.dev
spec:
  group: foreman.llmkube.dev
  names:
    kind: AgentRelease
    listKind: AgentReleaseList
    plural: agentreleases
    shortNames:
    - agr
    singular: agentrelease
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.approved
      name: Approved
      type: boolean
    - jsonPath: .status.updatedNodes
      name: Updated
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentRelease describes a fleet-wide rollout of a new agent binary version.
          It is cluster-scoped because agent releases span the entire fleet; there is
          no meaningful namespace boundary for a node-level binary update. The
          controller (added in a subsequent PR) will use this resource to drive a
          rolling, approval-gated, health-checked upgrade across all matching
          FleetNodes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec describes the desired rollout configuration.
            properties:
              agentKind:
                description: |-
                  AgentKind identifies which agent binary this release targets. The
                  controller uses this to filter FleetNodes by their reported AgentKind.
                enum:
                - foreman-agent
                - metal-agent
                type: string
              approved:
                default: false
                description: |-
                  Approved is the human-approval gate. When false (the default) the
                  controller waits in AwaitingApproval before beginning any rollout.
                  Set to true to allow the rollout to proceed.
                type: boolean
              artifacts:
                description: |-
                  Artifacts is the list of platform-specific binaries for this release.
                  The controller selects the appropriate artifact for each FleetNode
                  based on its reported OS and architecture.
                items:
                  description: |-
                    AgentReleaseArtifact describes a single platform-specific binary artifact
                    for an agent release. The operator uses OS and Arch to select the correct
                    artifact for each target FleetNode.
                  properties:
                    arch:
                      description: Arch is the target CPU architecture for this artifact.
                      enum:
                      - amd64
                      - arm64
                      type: string
                    os:
                      description: OS is the target operating system for this artifact.
                      enum:
                      - darwin
                      - linux
                      type: string
                    sha256:
                      description: |-
                        SHA256 is the lowercase hex-encoded SHA-256 digest of the artifact
                        binary. This is the trust anchor: the operator verifies the download
                        against this digest before dispatching the update to any node.
                      pattern: ^[0-9a-f]{64}$
                      type: string
                    url:
                      description: |-
                        URL is the download location for this artifact. The operator will
                        fetch it on behalf of target nodes unless a pre-placement mechanism
                        is in use.
                      type: string
                  required:
                  - arch
                  - os
                  - sha256
                  - url
                  type: object
                type: array
              concurrency:
                default: 1
                description: |-
                  Concurrency is the maximum number of nodes that may be updating
                  simultaneously. Defaults to 1 (one node at a time).
                format: int32
                minimum: 1
                type: integer
              healthGate:
                description: |-
                  HealthGate configures the post-update health check parameters applied
                  after each node is updated.
                properties:
                  minHealthySeconds:
                    default: 60
                    description: |-
                      MinHealthySeconds is how long a freshly-updated node must report a
                      fresh heartbeat continuously before the controller considers it healthy.
                      Defaults to 60 seconds.
                    format: int32
                    minimum: 0
                    type: integer
                  timeoutSeconds:
                    default: 600
                    description: |-
                      TimeoutSeconds is the maximum time the controller waits for a node to
                      pass the health gate before marking the node Failed. Defaults to 600
                      seconds (10 minutes).
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              paused:
                default: false
                description: |-
                  Paused suspends all further rollout activity when true. Nodes that are
                  already Updating continue to completion; no new nodes are picked up.
                type: boolean
              selector:
                description: |-
                  Selector restricts the rollout to FleetNodes whose labels match. When
                  nil, all FleetNodes of the given AgentKind are targeted.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              version:
                description: |-
                  Version is the target agent version string (e.g. "v0.9.0"). The
                  controller matches this against FleetNode.status.agentVersion to
                  determine which nodes require an update.
                type: string
            required:
            - agentKind
            - version
            type: object
          status:
            description: status is the controller's observed rollout state. Do not
              edit manually.
            properties:
              conditions:
                description: |-
                  Conditions is the set of standard Kubernetes conditions for this
                  release. The controller uses the types Approved, Progressing, and
                  Complete.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredVersion:
                description: |-
                  DesiredVersion mirrors spec.version at the time of last reconciliation,
                  allowing status readers to identify version drift without reading spec.
                type: string
              inFlightNodes:
                description: |-
                  InFlightNodes lists the names of FleetNodes that are currently being
                  updated (Phase=Updating). The length of this list is bounded by
                  spec.concurrency.
                items:
                  type: string
                type: array
              nodeStatuses:
                description: NodeStatuses is the per-node breakdown of rollout progress.
                items:
                  description: AgentReleaseNodeStatus is the per-node rollout state
                    within a release.
                  properties:
                    dispatchedAt:
                      description: |-
                        DispatchedAt is the time the controller wrote the UpdateRequest onto the
                        FleetNode. The timeout clock (HealthGate.TimeoutSeconds) is measured
                        from this timestamp. Set at dispatch; not updated thereafter.
                      format: date-time
                      type: string
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the time the node first reported the target agent
                        version (i.e. the soak clock start). The health-gate soak window
                        (HealthGate.MinHealthySeconds) is measured from this timestamp.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        Message is a human-readable reason for the current Phase (particularly
                        useful when Phase is Failed).
                      type: string
                    name:
                      description: Name is the FleetNode name (metadata.name of the
                        FleetNode CR).
                      type: string
                    observedVersion:
                      description: |-
                        ObservedVersion is the agent version last reported by this node's
                        FleetNode heartbeat. Empty until the node starts reporting version
                        information.
                      type: string
                    phase:
                      description: Phase is this node's position in the update lifecycle.
                      enum:
                      - Pending
                      - Updating
                      - Updated
                      - Failed
                      type: string
                    reason:
                      description: |-
                        Reason is a machine-readable explanation for why Phase is Failed.
                        Set only when Phase==Failed; empty otherwise.
                      enum:
                      - NodeUpdateTimeout
                      - NoMatchingArtifact
                      type: string
                  required:
                  - name
                  type: object
                type: array
              observedGeneration:
                description: |-
                  ObservedGeneration is the metadata.generation of the AgentRelease spec
                  that was most recently reconciled. Used to detect pending spec changes.
                format: int64
                type: integer
              phase:
                description: Phase is the overall rollout lifecycle state.
                enum:
                - Pending
                - AwaitingApproval
                - InProgress
                - Paused
                - Succeeded
                - Failed
                type: string
              targetNodes:
                description: |-
                  TargetNodes is the total number of FleetNodes that match this release's
                  selector and AgentKind.
                format: int32
                type: integer
              updatedNodes:
                description: |-
                  UpdatedNodes is the count of nodes that have been successfully updated
                  and passed the health gate.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

{{- end }}
