---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: modelprofiles.foreman.llmkube.dev
spec:
  group: foreman.llmkube.dev
  names:
    kind: ModelProfile
    listKind: ModelProfileList
    plural: modelprofiles
    shortNames:
    - mp
    singular: modelprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.restrictReadsInForcingPhase
      name: Reads-Restricted
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ModelProfile is reusable, cluster-scoped per-model harness tuning
          referenced by Agents via spec.modelProfileRef. Cluster-scoped because a
          profile is fleet-wide curated knowledge, not namespace-local state.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the per-model tuning.
            properties:
              restrictReadsInForcingPhase:
                description: |-
                  RestrictReadsInForcingPhase, when true, makes the EditFreeStreak
                  forcing phase also drop read_file from the advertised tool set (it
                  normally drops only grep/bash). This forces a thrash-prone model
                  that re-reads instead of editing to actually edit. Default false
                  preserves the standard forcing-phase behavior.
                type: boolean
              stuckLoopDetection:
                description: |-
                  StuckLoopDetection overrides the stuck-loop detector thresholds, but
                  only for Agents that reference this profile AND do not set their own
                  spec.stuckLoopDetection (the Agent's own block wins wholesale).
                  Non-zero fields override the harness default; zero fields inherit it.
                properties:
                  contextHardCap:
                    description: |-
                      ContextHardCap is the approximate-token budget that force-
                      terminates without a nudge stage. Must be > ContextSoftCap when
                      both are set; the executor disables both if soft >= hard rather
                      than producing inconsistent decisions.
                    format: int32
                    minimum: 0
                    type: integer
                  contextSoftCap:
                    description: |-
                      ContextSoftCap is the approximate-token budget that nudges the
                      model once. Zero disables (paired with ContextHardCap).
                    format: int32
                    minimum: 0
                    type: integer
                  editFreeTurnsLimit:
                    description: |-
                      EditFreeTurnsLimit is the number of consecutive turns without a
                      write_file, str_replace, or submit_result call required to fire
                      the edit-free signal. Zero disables.
                    format: int32
                    maximum: 200
                    minimum: 0
                    type: integer
                  repeatedToolThreshold:
                    description: |-
                      RepeatedToolThreshold is the number of identical (tool_name, args)
                      calls required to fire the duplicate-call signal. Zero disables.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
              systemPromptAddendum:
                description: |-
                  SystemPromptAddendum is appended (never substituted) to the
                  referencing Agent's systemPrompt at dispatch, separated by a blank
                  line. Use it to damp model-specific artifacts (e.g. an over-gating
                  model that stalls on fully-authorized work). Empty is a no-op.
                type: string
            type: object
          status:
            description: status is reserved; the MVP has no reconciler.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
