---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workloads.foreman.llmkube.dev
spec:
  group: foreman.llmkube.dev
  names:
    kind: Workload
    listKind: WorkloadList
    plural: workloads
    shortNames:
    - wl
    singular: workload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.repo
      name: Repo
      type: string
    - jsonPath: .status.succeededTasks
      name: Tasks
      type: integer
    - jsonPath: .status.failedTasks
      name: Failed
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Workload is the v0.1 entrypoint to Foreman. A user creates a Workload with
          a high-level Intent plus either an explicit Pipeline (full control) or an
          Issues list + Coder/Verifier agent refs (the common shortcut). The
          WorkloadReconciler emits one AgenticTask per pipeline step, owner-ref'd
          to the Workload, and the scheduler then dispatches them across the fleet.

          In v0.1 the reconciler is a deterministic stub: it does not call an LLM
          to plan. v0.2 will add an LLM-driven planner for the Intent-only mode.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the user-supplied intent.
            properties:
              coderAgentRef:
                description: |-
                  CoderAgentRef is required when Issues is set: names the same-
                  namespace Agent the code-<N> steps reference. Ignored in explicit
                  Pipeline mode.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              intent:
                description: |-
                  Intent is the natural-language description of what to do.
                  Example: "fix all open bugs in defilantech/LLMKube tagged size/small".
                minLength: 1
                type: string
              issues:
                description: |-
                  Issues, when set and Pipeline is empty, drives the issue-batch
                  shortcut. The reconciler emits one code/verify pair per issue
                  number using CoderAgentRef + VerifierAgentRef. Repo + Branch + Issue
                  fields are populated from the Workload's spec.repo and the issue
                  numbers themselves; downstream verify tasks DependOn the upstream
                  code task automatically.
                items:
                  format: int32
                  type: integer
                type: array
              maxTasks:
                description: |-
                  MaxTasks caps how many AgenticTasks may be emitted. Zero means no
                  limit. Applied after pipeline expansion: if Issues has 20 entries and
                  MaxTasks is 10, only the first 10 issues are processed and a
                  Truncated condition is set.
                format: int32
                minimum: 0
                type: integer
              pipeline:
                description: |-
                  Pipeline, when set, bypasses the planner and emits AgenticTasks
                  verbatim from this list. Each step becomes one AgenticTask
                  owner-ref'd to this Workload, named "<workload-name>-<step.name>".
                  Pipeline takes precedence over Issues + agent-ref shortcuts when
                  both are set. Used for hand-authored pipelines and re-runs.
                items:
                  description: |-
                    PipelineStep is one step in an explicit Workload pipeline. Each step
                    becomes one AgenticTask owner-ref'd to the Workload.

                    Names are scoped to the Workload: the reconciler renders the resulting
                    AgenticTask name as "<workload-name>-<step.name>" so two Workloads in
                    the same namespace can reuse step names without colliding. DependsOn
                    references use the step-local Name; the reconciler resolves these to
                    absolute task names at render time.
                  properties:
                    agentRef:
                      description: AgentRef names the same-namespace Agent that runs
                        this step.
                      properties:
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    dependsOn:
                      description: |-
                        DependsOn lists other PipelineStep.Name values within this Workload
                        whose AgenticTasks must reach Succeeded before this step's task is
                        dispatched. The reconciler rewrites these to absolute task names
                        when rendering.
                      items:
                        type: string
                      type: array
                    kind:
                      description: Kind selects the AgenticTask kind to emit.
                      enum:
                      - issue-fix
                      - verify
                      - freeform
                      type: string
                    name:
                      description: |-
                        Name identifies the step within this Workload's pipeline. Becomes
                        the suffix of the rendered AgenticTask name and the target ID for
                        other steps' DependsOn entries.
                      minLength: 1
                      pattern: ^[a-z0-9][a-z0-9-]*$
                      type: string
                    payload:
                      description: Payload mirrors AgenticTaskSpec.Payload exactly.
                      properties:
                        agent:
                          description: |-
                            Agent is the named agent to invoke. Required for freeform; defaults
                            to "issue-fixer" for issue-fix and "verify" for verify.
                          type: string
                        branch:
                          description: Branch is the existing branch to gate. Required
                            for verify.
                          type: string
                        branchPrefix:
                          description: |-
                            BranchPrefix overrides the branch name prefix on issue-fix tasks
                            (default derived from the issue's labels via conventional commit
                            prefixes: fix/, feat/, chore/, etc.).
                          type: string
                        issue:
                          description: Issue is the GitHub issue number. Required
                            for issue-fix.
                          format: int32
                          minimum: 1
                          type: integer
                        prompt:
                          description: Prompt is the agent input. Required for freeform.
                          type: string
                        repo:
                          description: Repo is the "owner/name" GitHub repo. Required
                            for issue-fix and verify.
                          type: string
                      type: object
                    priority:
                      description: |-
                        Priority is a scheduler hint when multiple tasks are Pending.
                        Higher values dispatch first. v0.1 is FIFO and ignores priority.
                      format: int32
                      type: integer
                    timeoutSeconds:
                      description: |-
                        TimeoutSeconds bounds the agent's run time on this step. Zero uses
                        the operator's default (2700 seconds).
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - agentRef
                  - kind
                  - name
                  - payload
                  type: object
                type: array
              plannerModel:
                description: |-
                  PlannerModel selects the frontier model the planner should call.
                  Empty uses the operator's default (Anthropic Claude). v0.1 stores
                  this verbatim but does not consume it (planner is deferred to v0.2);
                  the value round-trips through status.plannerModel for visibility.
                type: string
              repo:
                description: |-
                  Repo is the GitHub repo in "owner/name" form that Intent applies to.
                  Required for issue-fix workloads; supplies the Payload.Repo for each
                  generated AgenticTask in issue-batch mode. Ignored in explicit
                  Pipeline mode (each step carries its own Payload.Repo).
                type: string
              verifierAgentRef:
                description: |-
                  VerifierAgentRef is required when Issues is set: names the same-
                  namespace Agent the verify-<N> steps reference. Ignored in explicit
                  Pipeline mode.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - intent
            type: object
          status:
            description: status is the planner's and scheduler's observed view.
            properties:
              conditions:
                description: 'Conditions track standard signals: Planned, Dispatched,
                  Completed.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failedTasks:
                description: FailedTasks counts child tasks in phase Failed.
                format: int32
                type: integer
              phase:
                description: Phase is the lifecycle state.
                enum:
                - Planning
                - Planned
                - Dispatched
                - Completed
                - Failed
                type: string
              plannerModel:
                description: |-
                  PlannerModel records which frontier model the planner actually used
                  for this workload. Set after the planner runs.
                type: string
              succeededTasks:
                description: SucceededTasks counts child tasks in phase Succeeded.
                format: int32
                type: integer
              tasks:
                description: |-
                  Tasks lists the AgenticTask objects the planner emitted. They are
                  owner-ref'd to this Workload so they cascade-delete with it.
                items:
                  description: ObjectReference contains enough information to let
                    you inspect or modify the referred object.
                  properties:
                    apiVersion:
                      description: API version of the referent.
                      type: string
                    fieldPath:
                      description: |-
                        If referring to a piece of an object instead of an entire object, this string
                        should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                        For example, if the object reference is to a container within a pod, this would take on a value like:
                        "spec.containers{name}" (where "name" refers to the name of the container that triggered
                        the event) or if no container name is specified "spec.containers[2]" (container with
                        index 2 in this pod). This syntax is chosen only to have some well-defined way of
                        referencing a part of an object.
                      type: string
                    kind:
                      description: |-
                        Kind of the referent.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                      type: string
                    name:
                      description: |-
                        Name of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      type: string
                    namespace:
                      description: |-
                        Namespace of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                      type: string
                    resourceVersion:
                      description: |-
                        Specific resourceVersion to which this reference is made, if any.
                        More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                      type: string
                    uid:
                      description: |-
                        UID of the referent.
                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
