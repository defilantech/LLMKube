{{- if .Values.agent.enabled }}
{{- if .Values.agent.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "foreman.agent.serviceAccountName" . }}
  namespace: {{ include "foreman.namespace" . }}
  labels:
    {{- include "foreman.agent.labels" . | nindent 4 }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "foreman.fullname" . }}-agent
  labels:
    {{- include "foreman.agent.labels" . | nindent 4 }}
rules:
  # FleetNode self-registration + heartbeat.
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["fleetnodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["fleetnodes/status"]
    verbs: ["get", "update", "patch"]

  # AgenticTask watcher: claim Scheduled tasks for this node, update
  # status on completion.
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["agentictasks"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["agentictasks/status"]
    verbs: ["get", "update", "patch"]

  # Read the referenced Agent CR + the InferenceService it points at
  # to resolve the executor's base URL.
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  # Read the optional ModelProfile a given Agent may reference.
  - apiGroups: ["foreman.llmkube.dev"]
    resources: ["modelprofiles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.llmkube.dev"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch"]

  # When --inference-base-url-host-override is set (off-cluster,
  # same-host installs), the native executor reads the live llama-
  # server port from the EndpointSlice the metal-agent maintains for
  # each InferenceService. The controller-runtime cache backs this with
  # a watch so a respawn-driven port roll is picked up on the next task
  # dispatch (#540).
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

  # The metal-agent registers endpoints as discovery.k8s.io EndpointSlices.
  # Older agents published a legacy core/v1 Endpoints object instead. On
  # upgrade across that change the stale Endpoints object is orphaned and the
  # built-in EndpointSliceMirroring controller keeps regenerating a mirror
  # slice from it, blackholing a share of traffic on the selector-less Service
  # (#891). RegisterEndpoint best-effort reaps that legacy object, which needs
  # get + delete on core/endpoints. Scope is intentionally narrow: the agent
  # only ever touches the Endpoints whose name matches a Service it manages and
  # that carries its own managed-by label.
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "delete"]

  # When an Agent's spec.provider is "cloud-proxy" (v0.2), the
  # native executor reads providerConfig.apiKeySecretRef and dispatches
  # to the upstream HTTP endpoint with a Bearer token from the named
  # Secret. Scope is intentionally just `get`: the executor never
  # lists or watches Secrets, only reads the specific ones the
  # referenced Agents point at.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

  # Native executor writes the per-task transcript ConfigMap, owner-
  # ref'd to the AgenticTask.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # run_gate_job tool submits + reads Jobs in the foreman namespace.
  # Pod log access lives on the core "pods/log" subresource.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Event reporting from the watcher + executor.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "foreman.fullname" . }}-agent
  labels:
    {{- include "foreman.agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "foreman.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "foreman.agent.serviceAccountName" . }}
    namespace: {{ include "foreman.namespace" . }}
{{- end }}
