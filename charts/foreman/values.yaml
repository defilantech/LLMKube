# Default values for the Foreman chart.
#
# Foreman is opt-in: installing it pulls in foreman-operator (the
# controllers for Agent / AgenticTask / FleetNode / Workload) plus
# zero or more foreman-agent Pods (the per-node worker that claims
# Scheduled tasks and runs them). See README and
# https://llmkube.com/docs/foreman/install-verifier-node for a full install walkthrough.

# Optional name overrides. Same semantics as the llmkube chart.
nameOverride: ""
fullnameOverride: ""

# Where the chart's resources land. Defaults to .Release.Namespace.
# Override only when you need a namespace different from the one
# `helm install -n` points at.
namespace: ""

# imagePullSecrets are attached to BOTH the operator and agent
# Deployments when set.
imagePullSecrets: []

# Foreman-wide policy knobs that span operator + agent. Add new
# settings here when they are not naturally scoped to one component.
foreman:
  # allowCloudProviders is the cluster-wide sovereignty kill switch
  # for cloud-proxy reviewer Agents (v0.2 Day 4).
  #
  # When true (default), reviewer Agents whose spec.provider is
  # "cloud-proxy" may dispatch, subject to per-Workload
  # spec.allowCloudReviewers gating. When false, the
  # WorkloadReconciler drops every step whose Agent.spec.provider is
  # non-local and surfaces a CloudReviewersSuppressed condition on
  # the Workload. Air-gapped and compliance-restricted clusters
  # should set this false.
  allowCloudProviders: true

operator:
  enabled: true
  replicaCount: 1

  image:
    # registry: ghcr.io                                 # optional prefix
    repository: ghcr.io/defilantech/llmkube-foreman-operator
    tag: ""                                             # defaults to .Chart.AppVersion
    digest: ""                                          # wins over tag when set
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""                                            # generated by helper

  leaderElection:
    enabled: true

  # The four foreman controllers stream logs at this level. Bump to
  # debug only when debugging a bad reconcile cycle.
  logLevel: info

  # Metrics + health endpoints on the operator pod. Match the
  # llmkube core operator's defaults for symmetry.
  metrics:
    enabled: true
    port: 8081
  health:
    port: 8082

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  affinity: {}
  tolerations: []
  podAnnotations: {}
  podLabels: {}
  env: []

agent:
  # foreman-agent claims Scheduled AgenticTasks for this node and
  # executes them. Disable when only running the foreman-operator
  # (e.g. on the control-plane cluster while workers run elsewhere).
  enabled: true
  replicaCount: 1

  image:
    # registry: ghcr.io
    repository: ghcr.io/defilantech/llmkube-foreman-agent
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""

  # Executor mode the foreman-agent starts in.
  #   stub:   sleep 10s + write a synthetic Succeeded result. Useful
  #           for chart-install smoke tests and for nodes that should
  #           visibly register without yet hosting a model.
  #   native: the M3 native agent loop. Requires an InferenceService
  #           reachable from this node when the Agent CR points at one.
  # The gate Agent (M4) works fine in native mode without
  # an InferenceService because it's deterministic.
  mode: stub

  # --roles flag passed to the foreman-agent. The scheduler matches
  # AgenticTask.spec.requiredCapability.roles against this set.
  # Conventions: "worker" = "this node can run user-facing
  # AgenticTasks"; "verifier" = "this node can host the gate Agent".
  roles:
    - worker

  # --task-namespace flag. Empty = watch all namespaces. Pin to a
  # namespace when a single Foreman install serves multiple
  # tenants that should not see each other's tasks.
  taskNamespace: ""

  # Models the foreman-agent advertises in its FleetNode.spec
  # heartbeat. Use kebab-case slugs (e.g. "qwen36-35b-carnice-mtp").
  installedModels: []

  # Optional override for the InferenceService base URL the native
  # executor talks to. Leave empty in-cluster and set in dev when the
  # agent runs outside the cluster against a port-forwarded service.
  inferenceBaseURLOverride: ""

  # Where the native + deterministic executors clone working copies
  # of a repo for the duration of a task. The /workspace path is
  # mounted as an emptyDir below; override here if you want a PVC-
  # backed workspace (e.g. to keep go-build caches warm across runs)
  # or a different in-Pod path. The default /workspace is the right
  # answer on the published distroless image because the binary's
  # home dir (/home/nonroot) is on the read-only rootfs and breaks
  # the deterministic gate Agent's workspace prep step.
  workspaceDir: /workspace

  # Git remote the executor (both native LLM-driven coder and the
  # deterministic gate, which clones the upstream coder's branch from
  # the fork) reads from and pushes branches to. Required for ALL
  # native-mode nodes including verifier-only nodes:
  #
  #   - coder-role nodes (M5 Max running the Carnice Agent) need it to
  #     push the resulting branch.
  #   - verifier-role nodes (ShadowStack running the M4 gate Agent)
  #     need it because run_gate_job clones the branch the coder pushed
  #     to the fork, not the upstream repo where the branch does not
  #     yet exist.
  #
  # Leaving this empty puts the agent into "deterministic-only-without-
  # network-git" mode: the M4 V3 two-step pipeline fails at the gate's
  # clone step with "foreman-agent was not started with --git-remote-url;
  # cannot clone". Stub-mode agents do not need it.
  gitRemoteURL: ""

  # Git author + committer identity stamped onto commits the coder-
  # role executor produces. Required when agent.mode=native AND the
  # agent's roles include "worker" (i.e. it can host the coder Agent).
  # Verifier-only nodes can leave these empty -- the gate path does not
  # commit anything.
  commitAuthorName: ""    # defaults to "Foreman Bot" inside the binary
  commitAuthorEmail: ""

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  # GitHub token the M3 coder-role Agent uses to push branches to the
  # fork. Set tokenSecret.name to a pre-created Secret holding
  # `GITHUB_TOKEN`. Leaving this empty disables the env-var injection
  # (stub mode, gate-only nodes).
  githubToken:
    secretName: ""
    secretKey: GITHUB_TOKEN

  # M4 gate cache PVC. Shared across run_gate_job invocations so
  # GOMODCACHE / GOCACHE / XDG_DATA_HOME persist between runs.
  # Disable on nodes that never host the gate Agent.
  gateCache:
    enabled: true
    name: ""                                            # generated by helper
    accessModes: ["ReadWriteOnce"]
    size: 20Gi
    storageClass: ""                                    # cluster default if unset
    annotations: {}

  nodeSelector: {}
  affinity: {}
  tolerations: []
  podAnnotations: {}
  podLabels: {}
  env: []
