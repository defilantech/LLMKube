# Default values for the Foreman chart.
#
# Foreman is opt-in: installing it pulls in foreman-operator (the
# controllers for Agent / AgenticTask / FleetNode / Workload) plus
# zero or more foreman-agent Pods (the per-node worker that claims
# Scheduled tasks and runs them). See README and
# https://llmkube.com/docs/foreman/install-verifier-node for a full install walkthrough.

# Optional name overrides. Same semantics as the llmkube chart.
nameOverride: ""
fullnameOverride: ""

# Where the chart's resources land. Defaults to .Release.Namespace.
# Override only when you need a namespace different from the one
# `helm install -n` points at.
namespace: ""

# imagePullSecrets are attached to BOTH the operator and agent
# Deployments when set.
imagePullSecrets: []

# Foreman-wide policy knobs that span operator + agent. Add new
# settings here when they are not naturally scoped to one component.
networkPolicies:
  enabled: false
  additionalEgressCIDRs: []
foreman:
  # allowCloudProviders is the cluster-wide sovereignty kill switch
  # for cloud-proxy reviewer Agents (v0.2).
  #
  # When true (default), reviewer Agents whose spec.provider is
  # "cloud-proxy" may dispatch, subject to per-Workload
  # spec.allowCloudReviewers gating. When false, the
  # WorkloadReconciler drops every step whose Agent.spec.provider is
  # non-local and surfaces a CloudReviewersSuppressed condition on
  # the Workload. Air-gapped and compliance-restricted clusters
  # should set this false.
  allowCloudProviders: true

operator:
  enabled: true
  replicaCount: 1

  image:
    # registry: ghcr.io                                 # optional prefix
    repository: ghcr.io/defilantech/llmkube-foreman-operator
    tag: ""                                             # defaults to .Chart.AppVersion
    digest: ""                                          # wins over tag when set
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""                                            # generated by helper

  leaderElection:
    enabled: true

  # The four foreman controllers stream logs at this level. Bump to
  # debug only when debugging a bad reconcile cycle.
  logLevel: info

  # Metrics + health endpoints on the operator pod. Match the
  # llmkube core operator's defaults for symmetry.
  metrics:
    enabled: true
    port: 8081
  health:
    port: 8082

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  nodeSelector: {}
  affinity: {}
  tolerations: []
  podAnnotations: {}
  podLabels: {}
  env: []

# webhook configures the validating admission webhook that fronts Agent +
# AgenticTask CRs (#520). It surfaces invariant violations (unknown tool
# name, missing systemPrompt, dangling agentRef) at `kubectl apply` time
# instead of at executor-dispatch time.
#
# Certs are self-signed by the chart with Helm's genCA/genSignedCert and
# stay stable across `helm upgrade` via a lookup-reuse of the existing
# serving Secret. No cert-manager dependency: the chart installs cleanly
# in a bare cluster.
webhook:
  # enabled toggles ALL webhook resources (Service, cert Secret,
  # ValidatingWebhookConfiguration) and the operator's --enable-webhooks
  # flag. False renders none of them and starts the operator with the
  # webhook server off.
  enabled: true

  # failurePolicy controls what happens when the webhook is unreachable.
  # "Fail" (default) rejects the apply, which is the safe choice for an
  # operator that should always be running. "Ignore" admits the CR
  # unvalidated; use only if a transient operator outage blocking applies
  # is worse than admitting an occasional invalid CR.
  #
  # Operational tradeoff with a SINGLE operator replica (the default):
  # because the webhook server runs in the operator pod, a rolling
  # restart or upgrade leaves a brief window where the old pod is gone
  # and the new pod is not yet Ready. During that window, with
  # failurePolicy "Fail", EVERY Agent and AgenticTask CREATE/UPDATE
  # clusterwide is rejected (the API server cannot reach any webhook
  # backend), which can stall the Foreman pipeline and any controller
  # that patches these CRs. If that window is unacceptable, either set
  # failurePolicy to "Ignore" (accept unvalidated CRs during the gap) or
  # run 2+ operator replicas so a Ready webhook backend always exists
  # across a rollout. Do NOT add a namespaceSelector to dodge this: it
  # would narrow enforcement and let unvalidated CRs through in the
  # excluded namespaces permanently, not just during a restart.
  failurePolicy: Fail

  # port the operator's webhook server listens on (matches the container
  # port + the Service targetPort).
  port: 9443

  # certificate validity in days. The cert is reused across upgrades, so
  # this is effectively the rotation horizon (re-install or delete the
  # serving Secret to force regeneration before expiry).
  certValidityDays: 3650

agent:
  # foreman-agent claims Scheduled AgenticTasks for this node and
  # executes them. Disable when only running the foreman-operator
  # (e.g. on the control-plane cluster while workers run elsewhere).
  enabled: true
  replicaCount: 1

  image:
    # registry: ghcr.io
    # Default: the lean runtime image (alpine + git). To run a coder-enabled
    # in-cluster agent, point this at the coder image
    # (ghcr.io/defilantech/llmkube-foreman-agent-coder, same tag), which ships
    # the Go toolchain + golangci-lint/controller-gen/make/helm the coder's
    # fast self-gate needs, and add "coder" to agent.roles below (#835).
    repository: ghcr.io/defilantech/llmkube-foreman-agent
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""

  # Executor mode the foreman-agent starts in.
  #   stub:   sleep 10s + write a synthetic Succeeded result. Useful
  #           for chart-install smoke tests and for nodes that should
  #           visibly register without yet hosting a model.
  #   native: the M3 native agent loop. Requires an InferenceService
  #           reachable from this node when the Agent CR points at one.
  # The gate Agent (M4) works fine in native mode without
  # an InferenceService because it's deterministic.
  mode: stub

  # --roles flag passed to the foreman-agent. The scheduler matches
  # AgenticTask.spec.requiredCapability.roles against this set.
  # Conventions: "worker" = "this node can run user-facing
  # AgenticTasks"; "verifier" = "this node can host the gate Agent";
  # "coder" = "this node can run a coder loop end-to-end". Only advertise
  # "coder" on an agent running the coder image (see agent.image above) and
  # with coder.gitCredentialsSecret set, so its fast self-gate has the Go
  # toolchain and it can push the branch (#835).
  roles:
    - worker

  # Labels stamped onto this agent's FleetNode metadata on every
  # registration (via --node-labels), so capability-routing nodeSelectors
  # (an Agent's requiredCapability.nodeSelector) keep matching across pod
  # restarts. A hand-applied `kubectl label fleetnode` is lost when the pod
  # (and its FleetNode, named for the pod) is recreated; these are not (#881).
  # Example:
  #   nodeLabels:
  #     coder-pool: amd
  nodeLabels: {}

  # --task-namespace flag. Empty = watch all namespaces. Pin to a
  # namespace when a single Foreman install serves multiple
  # tenants that should not see each other's tasks.
  taskNamespace: ""

  # Models the foreman-agent advertises in its FleetNode.spec
  # heartbeat. Use kebab-case slugs (e.g. "qwen36-35b-carnice-mtp").
  installedModels: []

  # Optional override for the InferenceService base URL the native
  # executor talks to. Leave empty in-cluster and set in dev when the
  # agent runs outside the cluster against a port-forwarded service.
  inferenceBaseURLOverride: ""

  # Where the native + deterministic executors clone working copies
  # of a repo for the duration of a task. The /workspace path is
  # mounted as an emptyDir below; override here if you want a PVC-
  # backed workspace (e.g. to keep go-build caches warm across runs)
  # or a different in-Pod path. The default /workspace is the right
  # answer on the published distroless image because the binary's
  # home dir (/home/nonroot) is on the read-only rootfs and breaks
  # the deterministic gate Agent's workspace prep step.
  workspaceDir: /workspace

  # Git remote the executor reads from and pushes branches to. OPTIONAL
  # as of #915:
  #
  #   - Set: pins every coder task to this one fork/repo (the single-repo
  #     fork-PR model). The coder pushes the branch here and the gate
  #     clones it from here.
  #   - Empty: each coder task clones and pushes its OWN payload.repo
  #     (github.com/<owner>/<name>), so a single agent serves many repos.
  #     The gate then constructs the same clone URL from payload.repo, so
  #     it still finds the branch the coder pushed.
  #
  # Set this only to force every task onto one remote (a shared fork).
  # A coder task with neither this NOR a payload.repo fails at the clone
  # step with GitRemoteNotConfigured. Stub-mode agents ignore it.
  gitRemoteURL: ""

  # Git author + committer identity stamped onto commits the coder-
  # role executor produces. Required when agent.mode=native AND the
  # agent's roles include "worker" (i.e. it can host the coder Agent).
  # Verifier-only nodes can leave these empty -- the gate path does not
  # commit anything.
  commitAuthorName: ""    # defaults to "Foreman Bot" inside the binary
  commitAuthorEmail: ""

  # The memory LIMIT is a cap, not a reservation (requests stays lean), so a
  # reviewer/scheduler/worker agent still uses ~256Mi -- the high cap only
  # matters for a coder-role agent. A coder's in-workspace self-gate runs
  # golangci-lint + go build + go test over the whole target module, which
  # spikes well past 2Gi and OOMKills the pod at the old default (#880). 8Gi
  # gives that gate headroom while costing non-coder agents nothing. Lower the
  # limit if you only run reviewer/scheduler roles on memory-tight nodes.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 8Gi

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  # GitHub token the M3 coder-role Agent uses to push branches to the
  # fork. Set tokenSecret.name to a pre-created Secret holding
  # `GITHUB_TOKEN`. Leaving this empty disables the env-var injection
  # (stub mode, gate-only nodes).
  githubToken:
    secretName: ""
    secretKey: GITHUB_TOKEN

  # M4 gate cache PVC. Shared across run_gate_job invocations so
  # GOMODCACHE / GOCACHE / XDG_DATA_HOME persist between runs.
  # Disable on nodes that never host the gate Agent.
  gateCache:
    enabled: true
    name: ""                                            # generated by helper
    accessModes: ["ReadWriteOnce"]
    size: 20Gi
    storageClass: ""                                    # cluster default if unset
    annotations: {}

  nodeSelector: {}
  affinity: {}
  tolerations: []
  podAnnotations: {}
  podLabels: {}
  env: []

# coder gates the ServiceAccount + namespaced Role the Job-mode coder
# pods run under (#620). A Job-mode Agent (spec.execution.mode=Job) runs
# `foreman-agent run-task` in an ephemeral Job whose pod uses this SA.
# The run-task body only READS the AgenticTask, the referenced Agent, and
# its InferenceService, so the Role is read-only. Leave enabled when any
# Agent in the cluster uses Job-mode execution; disable on clusters that
# only run the in-process (metal) coder path.
coder:
  enabled: true

  serviceAccount:
    # When create is true, the chart provisions the SA and its Role +
    # RoleBinding. Set false to bind an externally managed SA (still
    # gets the Role + RoleBinding so long as coder.enabled is true).
    create: true
    # Name of the coder Job ServiceAccount. Defaults to "foreman-coder"
    # so a sample Agent's spec.execution.serviceAccountName=foreman-coder
    # works without extra wiring. Override to suit your naming.
    name: ""

  # Git Secret the coder Job projects as GITHUB_TOKEN for the clone +
  # push (#620). These pass through to the foreman-agent watcher as
  # --coder-git-secret / --coder-git-secret-key.
  #
  # Defaults match the standalone foreman-git-credentials Secret (key
  # "token") so existing installs are unchanged. To REUSE an existing
  # git Secret instead of creating a new one, point these at it: e.g.
  # gitCredentialsSecret: foreman-github with gitCredentialsSecretKey:
  # GITHUB_TOKEN reuses the same Secret the foreman-agent itself uses.
  gitCredentialsSecret: foreman-git-credentials
  gitCredentialsSecretKey: token
