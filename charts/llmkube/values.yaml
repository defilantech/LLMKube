# Default values for llmkube.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Namespace to deploy the controller
namespace: llmkube-system

# Controller manager configuration
controllerManager:
  # Controller image
  image:
    # Registry for the controller image. When set, prepended to repository.
    # Useful for air-gapped or enterprise proxy registries.
    # Example: "my-registry.company.com"
    registry: ""
    repository: ghcr.io/defilantech/llmkube-controller
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    # Image digest (sha256:...) - takes precedence over tag when set.
    # Use digests for production deployments to ensure immutable, verifiable images.
    # Example: sha256:abc123def456...
    digest: ""

  # Number of controller replicas (recommended: 1 for active/passive HA)
  replicaCount: 1

  # Leader election configuration
  leaderElection:
    enabled: true

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 512Mi

  # Security context for the controller pod
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Security context for the manager container
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

  # Health probe configuration
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

  # Node affinity for multi-architecture support
  nodeSelector: {}

  tolerations: []

  affinity: {}

  # Container image used for the model downloader init container
  initContainer:
    registry: ""
    repository: docker.io/curlimages/curl
    tag: "8.18.0"
    # Default fsGroup applied to the rendered PodSecurityContext when the
    # InferenceService does not provide its own Spec.PodSecurityContext.
    # 102 matches curlimages/curl curl_group GID and lets the init container
    # write to a freshly-provisioned PVC on storage classes that initialize
    # volumes as root:root 0755 (e.g., Longhorn, OpenShift restricted-v2).
    #
    # Set to 0 on OpenShift, where the restricted-v2 SCC injects fsGroup
    # from the namespace's allocated range and rejects pods with explicit
    # values outside that range.
    defaultFSGroup: 102

  # Additional environment variables
  env: []

  # Default container image for ModelRouter-managed router-proxy pods.
  # Per-ModelRouter spec.proxy.image overrides this for individual routers.
  # The router-proxy is a lightweight HTTP server that fronts
  # InferenceServices and external provider backends, speaks
  # OpenAI chat completions, and enforces policy routing.
  #
  # IMPORTANT (Phase 1 alpha): the release pipeline does not yet build
  # and push the router-proxy image alongside the controller image.
  # The default tag below is "dev" rather than the chart appVersion so
  # users who never create a ModelRouter resource are unaffected, and
  # users who do create one know they need to either:
  #
  #   1. Build the image locally (`make docker-build-router-proxy`)
  #      and push it to a registry their cluster can reach, then
  #      override repository / tag here.
  #   2. Override `spec.proxy.image` per ModelRouter with their own
  #      build.
  #
  # See https://github.com/defilantech/LLMKube/issues/449 for the
  # tracking issue on integrating the router-proxy image into the
  # release flow.
  routerProxy:
    # Registry prefix for the router-proxy image (mirrors controller image).
    # Useful for air-gapped or enterprise proxy registries.
    registry: ""
    repository: ghcr.io/defilantech/llmkube-router-proxy
    pullPolicy: IfNotPresent
    # Default tag. "dev" is intentional until the release pipeline
    # ships versioned router-proxy images alongside the controller.
    tag: "dev"
    # Image digest (sha256:...) - takes precedence over tag when set.
    # Use digests for production deployments once the release pipeline
    # publishes them.
    digest: ""

    # Cluster-wide default URL for ModelRouter External backends whose
    # provider=litellm and url is unspecified. Lets platform teams
    # centralize the LiteLLM proxy endpoint so application teams can
    # declare `external: {provider: litellm, model: ...}` without
    # repeating the LiteLLM Service URL on every ModelRouter. Empty
    # means application teams must include url explicitly.
    #
    # Example (in-cluster LiteLLM at the standard port):
    #   defaultLiteLLMURL: "http://litellm.litellm.svc.cluster.local:4000"
    defaultLiteLLMURL: ""

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Metrics service configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # Serve metrics over HTTPS with authn/authz (true) or plain HTTP (false).
  # Set to false when scraping from outside the cluster without a ServiceAccount token.
  secure: true
  # Service type for metrics
  service:
    type: ClusterIP
    port: 8443
    # NodePort to expose when service type is NodePort (optional, auto-assigned if empty)
    nodePort: ""
    annotations: {}

# Gateway-scoped audit access log (sub-slice 2c).
#
# Envoy Gateway configures access logging ONLY on the EnvoyProxy resource
# (telemetry.accessLog), gateway-infrastructure-scoped, not per route. The
# operator references an EXTERNAL Gateway via gatewayRef and does not own the
# EnvoyProxy, so the audit trail ships here as an opt-in, gateway-scoped artifact
# rather than a per-ModelRouter compiled resource. Default off, so existing
# installs are unaffected.
#
# Security posture (from the homelab spike):
#   - Header allowlist only: the Authorization header is NEVER logged.
#   - Request path and query string are omitted.
#   - Token fields (llm_input/output/total_token) are null on errors and
#     non-final frames; they are present only at end-of-stream on success.
#   - Request/response bodies are not loggable via access logs at all.
#
# The audit fields are produced by other slices already on the wire, so they
# populate automatically once those slices are active:
#   - team (x-team) from JWT auth (ModelRouter policy.auth.jwt),
#   - model (x-ai-eg-model) from the ext_proc,
#   - llm_*_token from the budget llmRequestCosts metadata.
gateway:
  auditLog:
    # Enable the gateway audit EnvoyProxy. Off by default.
    enabled: false
    # Name/namespace of the rendered EnvoyProxy. You MUST reference this
    # EnvoyProxy from your GatewayClass (spec.parametersRef) or Gateway
    # (spec.infrastructure.parametersRef): the chart cannot own external gateway
    # infra, so the access log only takes effect once you wire that parametersRef.
    envoyProxyName: llmkube-audit
    # Namespace for the EnvoyProxy (defaults to the release namespace).
    envoyProxyNamespace: ""
    # OpenTelemetry sink (the Loki/collector path). When disabled, only the
    # File/stdout JSON sink is emitted.
    otel:
      enabled: false
      # gRPC backend reference for the OTel collector.
      backendRef:
        name: otel-collector
        namespace: ""
        port: 4317
      # Resource attributes attached to every emitted log record.
      resourceAttributes:
        serviceName: llmkube-ai-gateway
        clusterName: llmkube

# Prometheus Operator integration
prometheus:
  # Enable Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    # Additional labels for ServiceMonitor (e.g., for prometheus-operator selector)
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
    # Scrape interval
    interval: 30s
    # Namespace for ServiceMonitor (defaults to release namespace)
    namespace: ""

  # Enable PodMonitor for inference pod metrics (llama.cpp /metrics)
  inferencePodMonitor:
    enabled: false
    # Additional labels for PodMonitor
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
    # Scrape interval
    interval: 30s

  # Enable PrometheusRule for alerts
  prometheusRule:
    enabled: false
    # Additional labels for PrometheusRule
    additionalLabels:
      prometheus: kube-prometheus-stack-prometheus
      role: alert-rules
    # Namespace for PrometheusRule
    namespace: monitoring
    # Alert rules configuration
    rules:
      # GPU alerts
      gpu:
        enabled: true
        highUtilizationThreshold: 90
        highTemperatureThreshold: 85
        memoryPressureThreshold: 90
        powerLimitThreshold: 250
      # Inference service alerts
      inference:
        enabled: true

# Pyrra SLO integration. When enabled, the operator renders a Pyrra
# ServiceLevelObjective for every InferenceService that declares spec.slo,
# and Pyrra generates the Prometheus recording/alert rules and error-budget
# math. Pyrra itself is NOT installed by this chart; install it alongside
# kube-prometheus-stack first: https://github.com/pyrra-dev/pyrra
# See docs/observability/slo.md.
pyrra:
  enabled: false

# Custom Resource Definitions
crds:
  # Install CRDs as part of chart installation
  install: true
  # Keep CRDs on chart uninstall (recommended for production)
  keep: true

# Model cache configuration
modelCache:
  # Enable the persistent model cache. When true the operator provisions a cache
  # PVC for each InferenceService (perService) or a single shared PVC (shared),
  # per `mode` below.
  enabled: true
  # Cache provisioning mode:
  #   shared (default): a single cluster-wide "<release>-model-cache" PVC is
  #     created (honoring accessMode below). The operator mounts it and the
  #     InferenceService init container downloads remote models into it, so all
  #     InferenceServices share one cache (cross-isvc dedup) and `llmkube cache
  #     list` can inspect it. This is the proven default. On a multi-node cluster
  #     use an RWX storage class (NFS/EFS) so the cache is reachable from any
  #     node; the cluster default RWO class only works single-node.
  #   perService: each InferenceService gets its own RWO, WaitForFirstConsumer
  #     cache PVC ("<isvc>-model-cache") that binds on the node its serving pod
  #     schedules to. Use this as the opt-in escape hatch for multi-node clusters
  #     that do NOT have an RWX storage class: the cache co-locates with the
  #     workload instead of pinning to one node (#728). The tradeoff is no
  #     cross-isvc dedup (each InferenceService downloads its own copy).
  #     `llmkube cache list` discovers operator-managed per-service cache PVCs;
  #     user-managed `spec.modelCache.claimName` PVCs are outside that discovery
  #     contract.
  mode: shared
  # Storage size for each model cache PVC
  size: 100Gi
  # Storage class (leave empty for the cluster default). For shared on a
  # multi-node cluster use an RWX class; for perService the default class should
  # use volumeBindingMode WaitForFirstConsumer so the PVC binds on the serving
  # node. On a hard-tainted node, the storage provisioner's helper path must also
  # tolerate the taint; otherwise use a pre-provisioned claim.
  storageClass: ""
  # Access mode for the shared cache PVC (only used when mode=shared):
  # ReadWriteOnce (single-node) or ReadWriteMany (multi-node with NFS/EFS).
  # perService caches are always ReadWriteOnce.
  accessMode: ReadWriteOnce
  # Logical model cache path inside inference pods (passed to the operator as
  # --model-cache-path; not an operator-pod mount).
  mountPath: /models
  # Annotations for the shared PVC (e.g., for backup policies)
  annotations: {}

# Host-path allowlist for local (/abs and file://) and hostPath model sources.
# SECURITY (GHSA-jw3m-8q7m-f35r): empty list disables all such sources. To serve
# a model from node-local disk, list the absolute directory roots you trust, e.g.
#   allowedHostPathRoots:
#     - /srv/models
modelSource:
  allowedHostPathRoots: []
  # Remote-host allowlist for the controller-side SSRF guard on http/https
  # model sources. SECURITY (GHSA-jw3m-8q7m-f35r): the controller's metadata
  # and revalidation requests refuse to connect to private, link-local,
  # loopback, or unspecified addresses. Public hosts are always allowed; list
  # hostnames and/or CIDRs here only to re-permit trusted internal hosts, e.g.
  #   allowedRemoteHosts:
  #     - models.corp.internal
  #     - 10.20.0.0/16
  allowedRemoteHosts: []

# Priority classes for GPU scheduling
priorityClasses:
  # Create LLMKube priority classes (critical, high, normal, low, batch)
  enabled: true

# Image pull secrets for private registries
imagePullSecrets: []

# Name override
nameOverride: ""
fullnameOverride: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Validating admission webhook for ModelRouter (#661). Promotes the gateway
# honest-boundary checks (unsupported match, unsupported budget, invalid auth,
# invalid authorization, unsupported auditLog, unsafe sensitive route) from a
# post-reconcile GatewayReady=False status to an apply-time rejection, so a
# misconfigured router fails loud at `kubectl apply` instead of applying cleanly
# and silently doing nothing.
webhook:
  # enabled toggles ALL webhook resources (cert Secret, Service,
  # ValidatingWebhookConfiguration) AND the operator's --webhook-cert-path flag
  # plus the cert mount. False renders none of them and starts the operator with
  # the webhook server off (cmd/main.go only registers the webhook when the
  # serving cert is present). Defaults true to match the foreman chart; the
  # chart self-generates a stable serving cert (no cert-manager dependency), so
  # an upgrade of an existing install starts serving the webhook without manual
  # cert setup.
  enabled: true

  # failurePolicy controls what happens when the webhook is unreachable.
  # "Fail" (default) rejects the apply, which is the safe choice for an operator
  # that should always be running. "Ignore" admits the CR unvalidated; use only
  # if a transient operator outage blocking applies is worse than admitting an
  # occasional invalid ModelRouter.
  #
  # Operational tradeoff with a SINGLE controller replica (the default): the
  # webhook server runs in the controller pod, so a rolling restart or upgrade
  # leaves a brief window where the old pod is gone and the new pod is not yet
  # Ready. During that window, with failurePolicy "Fail", every ModelRouter
  # CREATE/UPDATE clusterwide is rejected (the API server cannot reach any
  # webhook backend). If that window is unacceptable, either set failurePolicy
  # to "Ignore" (accept unvalidated CRs during the gap) or run 2+ controller
  # replicas so a Ready webhook backend always exists across a rollout.
  failurePolicy: Fail

  # port the controller's webhook server listens on. This single value drives
  # all three consistently: the operator's --webhook-port flag (the server's
  # actual bind port), the container port, and the Service targetPort. Safe to
  # change; 9443 is the controller-runtime default.
  port: 9443

  # certificate validity in days. The cert is reused across upgrades, so this is
  # effectively the rotation horizon (re-install or delete the serving Secret to
  # force regeneration before expiry).
  certValidityDays: 3650

# multitenancy gates the opt-in multi-tenant admission + RBAC surface (#416).
# Default off: the InferenceService quota ValidatingWebhookConfiguration entry is
# NOT rendered (so InferenceService admission is never intercepted) and no tenant
# ClusterRoles are installed. Enabling it also requires webhook.enabled=true (the
# quota webhook reuses the same serving cert + Service). It does not change any
# existing (ModelRouter/Model) webhook.
multitenancy:
  enabled: false

# Network policies for the controller manager pod
networkPolicies:
  enabled: false
  additionalEgressCIDRs: []

# Fleet-wide runtime image overrides (#1197). When set, a value replaces the
# operator's built-in default image for that runtime backend, including its
# vendor-specific divergences. Intended for air-gapped or mirrored registries.
# An explicit InferenceService spec.image always wins over these. Empty values
# are ignored (stock defaults apply); the stock defaults are pinned in
# internal/controller/runtime_*.go and listed in docs/operations/
# b200-validation-matrix.md.
runtimeImages:
  llamacpp: ""
  vllm: ""
  sglang: ""
  tgi: ""

# Informational platform floors for NVIDIA Blackwell (B200-class) serving
# (#1197). Rendered into NOTES.txt at install time so a first deploy on new
# silicon fails loudly at the checklist, not cryptically at CUDA init. These
# do not gate anything; they document what the fleet's nodes must satisfy.
# Verified 2026-07-21 against the NVIDIA Blackwell Compatibility Guide, the
# GPU Operator platform-support matrix, and the NCCL release notes.
platformFloors:
  # Render the floors block in NOTES.txt.
  show: true
  nvidiaDriver: ">= 570.133.20 (R570 branch; R580/CUDA 13 current)"
  cudaToolkit: ">= 12.8 (first release with sm_100 codegen)"
  nccl: ">= 2.25.1 (first Blackwell support; 2.27+ recommended)"
  gpuOperator: ">= v25.3.0 (first HGX B200 support)"
