{{- /*
The shared, cluster-single model cache PVC is created ONLY in shared mode. In
the default perService mode the operator provisions a per-InferenceService PVC
at reconcile time (owner-ref'd to the InferenceService), so the chart creates no
cluster-wide PVC. See values.yaml modelCache.mode.
*/ -}}
{{- if and .Values.modelCache.enabled (eq .Values.modelCache.mode "shared") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "llmkube.fullname" . }}-model-cache
  namespace: {{ include "llmkube.namespace" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-cache
  {{- with .Values.modelCache.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.modelCache.accessMode }}
  {{- if .Values.modelCache.storageClass }}
  storageClassName: {{ .Values.modelCache.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.modelCache.size }}
{{- end }}
