apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmkube.fullname" . }}-controller-manager
  namespace: {{ include "llmkube.namespace" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicaCount }}
  selector:
    matchLabels:
      {{- include "llmkube.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "llmkube.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "llmkube.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controllerManager.podSecurityContext | nindent 8 }}
      containers:
      - name: manager
        image: {{ include "llmkube.controllerImage" . }}
        imagePullPolicy: {{ .Values.controllerManager.image.pullPolicy }}
        command:
        - /manager
        args:
        {{- if .Values.controllerManager.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        - --health-probe-bind-address=:8081
        {{- if .Values.metrics.enabled }}
        - --metrics-bind-address=:{{ .Values.metrics.service.port }}
        - --metrics-secure={{ .Values.metrics.secure }}
        {{- end }}
        {{- if .Values.pyrra.enabled }}
        - --enable-pyrra-slo
        {{- end }}
        {{- if .Values.modelCache.enabled }}
        - --model-cache-path={{ .Values.modelCache.mountPath }}
        - --model-cache-mode={{ .Values.modelCache.mode }}
        - --model-cache-size={{ .Values.modelCache.size }}
        {{- if .Values.modelCache.storageClass }}
        - --model-cache-storage-class={{ .Values.modelCache.storageClass }}
        {{- end }}
        - --model-cache-access-mode={{ .Values.modelCache.accessMode }}
        {{- else }}
        # Empty path disables caching (the flag defaults to /models otherwise).
        - --model-cache-path=
        {{- end }}
        {{- with .Values.modelSource.allowedHostPathRoots }}
        # SECURITY (GHSA-jw3m-8q7m-f35r): absolute path roots under which local
        # (/abs and file://) and hostPath model sources are permitted. Rendered
        # only when non-empty; the flag's empty default disables such sources.
        - --allowed-host-path-roots={{ join "," . }}
        {{- end }}
        {{- $ri := .Values.runtimeImages | default dict }}
        {{- $pairs := list }}
        {{- range $k, $v := $ri }}{{- if $v }}{{- $pairs = append $pairs (printf "%s=%s" $k $v) }}{{- end }}{{- end }}
        {{- if $pairs }}
        - --runtime-images={{ join "," $pairs }}
        {{- end }}
        {{- with .Values.modelSource.allowedRemoteHosts }}
        # SECURITY (GHSA-jw3m-8q7m-f35r): hostnames/CIDRs the controller-side
        # SSRF guard re-permits as remote (http/https) model sources despite
        # resolving to private/link-local/loopback ranges. Rendered only when
        # non-empty; the flag's empty default blocks all such ranges.
        - --allowed-remote-hosts={{ join "," . }}
        {{- end }}
        - --init-container-image={{ include "llmkube.initContainerImage" . }}
        # The default value is set in values.yaml. We do NOT use `| default 102`
        # here because Go template's default treats 0 as missing, which would
        # re-replace the OpenShift preset's deliberate 0 with 102 and break
        # SCC compatibility. Schema in values.schema.json enforces integer >= 0.
        - --default-fsgroup={{ .Values.controllerManager.initContainer.defaultFSGroup }}
        - --router-proxy-image={{ include "llmkube.routerProxyImage" . }}
        {{- with .Values.controllerManager.routerProxy.defaultLiteLLMURL }}
        - --default-litellm-url={{ . }}
        {{- end }}
        {{- /* Nil-safe at every level: with helm upgrade --reuse-values the
             chart defaults are NOT merged, so a release whose stored values
             predate the gpuSharing block would nil-pointer on a chained
             .Values.gpuSharing.pools.shared lookup. */}}
        {{- $gs := .Values.gpuSharing | default dict }}
        {{- $gsPools := $gs.pools | default dict }}
        {{- $gsShared := $gsPools.shared | default dict }}
        {{- $ns := $gsShared.nodeSelector | default dict }}
        {{- $nsPairs := list }}
        {{- range $k, $v := $ns }}{{- $nsPairs = append $nsPairs (printf "%s=%s" $k $v) }}{{- end }}
        {{- if $nsPairs }}
        - --gpu-sharing-shared-pool-selector={{ join "," $nsPairs }}
        {{- end }}
        {{- if gt (int ($gs.vramPerDeviceGiB | default 0)) 0 }}
        - --gpu-sharing-vram-per-device-gib={{ $gs.vramPerDeviceGiB }}
        {{- end }}
        {{- if .Values.webhook.enabled }}
        # Point the controller-runtime webhook server at the mounted serving
        # cert. cmd/main.go registers the ModelRouter validating webhook only
        # when this path holds tls.crt + tls.key, so webhook.enabled=false
        # (which omits the flag, the cert Secret, and the volume below) leaves
        # the operator running with no webhook.
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        - --webhook-port={{ .Values.webhook.port }}
        {{- end }}
        ports:
        - name: health
          containerPort: 8081
          protocol: TCP
        {{- if .Values.metrics.enabled }}
        - name: metrics
          containerPort: {{ .Values.metrics.service.port }}
          protocol: TCP
        {{- end }}
        {{- if .Values.webhook.enabled }}
        - name: webhook
          containerPort: {{ .Values.webhook.port }}
          protocol: TCP
        {{- end }}
        {{- with .Values.controllerManager.env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.controllerManager.securityContext | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.controllerManager.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.controllerManager.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.controllerManager.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.modelCache.enabled }}
        - name: model-cache
          mountPath: {{ .Values.modelCache.mountPath }}
        {{- end }}
        {{- if .Values.webhook.enabled }}
        # controller-runtime's default serving-cert location. The self-signed
        # cert Secret is mounted read-only here so the webhook server finds
        # tls.crt + tls.key without extra flags.
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.modelCache.enabled }}
      - name: model-cache
        {{- if eq .Values.modelCache.mode "shared" }}
        persistentVolumeClaim:
          claimName: {{ include "llmkube.fullname" . }}-model-cache
        {{- else }}
        # perService (default): a writable scratch for the controller's
        # local-source (file://) copy/validation path. Pins no node (#728);
        # inference pods download into their own per-isvc cache.
        emptyDir: {}
        {{- end }}
      {{- end }}
      {{- if .Values.webhook.enabled }}
      - name: webhook-certs
        secret:
          secretName: {{ include "llmkube.webhook.secretName" . }}
      {{- end }}
      {{- with .Values.controllerManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controllerManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
