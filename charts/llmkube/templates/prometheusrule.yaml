{{- if .Values.prometheus.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "llmkube.fullname" . }}-alerts
  namespace: {{ include "llmkube.prometheus.prometheusRule.namespace" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
    {{- with .Values.prometheus.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  {{- if .Values.prometheus.prometheusRule.rules.gpu.enabled }}
  - name: llmkube-slo
    interval: 30s
    rules:
    # GPU High Utilization Alert
    - alert: GPUHighUtilization
      expr: DCGM_FI_DEV_GPU_UTIL > {{ .Values.prometheus.prometheusRule.rules.gpu.highUtilizationThreshold }}
      for: 5m
      labels:
        severity: warning
        component: gpu
      annotations:
        summary: "GPU utilization is high"
        description: "GPU {{`{{ $labels.gpu }}`}} utilization is {{`{{ $value }}`}}% (threshold: {{ .Values.prometheus.prometheusRule.rules.gpu.highUtilizationThreshold }}%)"

    # GPU High Temperature Alert
    - alert: GPUHighTemperature
      expr: DCGM_FI_DEV_GPU_TEMP > {{ .Values.prometheus.prometheusRule.rules.gpu.highTemperatureThreshold }}
      for: 2m
      labels:
        severity: critical
        component: gpu
      annotations:
        summary: "GPU temperature is critically high"
        description: "GPU {{`{{ $labels.gpu }}`}} temperature is {{`{{ $value }}`}}°C (threshold: {{ .Values.prometheus.prometheusRule.rules.gpu.highTemperatureThreshold }}°C)"

    # GPU Memory Pressure Alert
    - alert: GPUMemoryPressure
      expr: (DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL) * 100 > {{ .Values.prometheus.prometheusRule.rules.gpu.memoryPressureThreshold }}
      for: 5m
      labels:
        severity: warning
        component: gpu
      annotations:
        summary: "GPU memory usage is high"
        description: "GPU {{`{{ $labels.gpu }}`}} memory usage is {{`{{ $value }}`}}% (threshold: {{ .Values.prometheus.prometheusRule.rules.gpu.memoryPressureThreshold }}%)"

    # GPU Power Limit Alert
    - alert: GPUPowerLimit
      expr: DCGM_FI_DEV_POWER_USAGE > {{ .Values.prometheus.prometheusRule.rules.gpu.powerLimitThreshold }}
      for: 10m
      labels:
        severity: warning
        component: gpu
      annotations:
        summary: "GPU power usage is high"
        description: "GPU {{`{{ $labels.gpu }}`}} power usage is {{`{{ $value }}`}}W (threshold: {{ .Values.prometheus.prometheusRule.rules.gpu.powerLimitThreshold }}W)"
  {{- end }}

  {{- if .Values.prometheus.prometheusRule.rules.inference.enabled }}
  - name: llmkube-inference
    interval: 30s
    rules:
    # Inference Service Down Alert
    - alert: InferenceServiceDown
      expr: up{job="llmkube-inference"} == 0
      for: 1m
      labels:
        severity: critical
        component: inference
      annotations:
        summary: "Inference service is down"
        description: "Inference service {{`{{ $labels.instance }}`}} has been down for more than 1 minute"

    # Model Controller Down Alert
    - alert: ControllerDown
      expr: up{job="llmkube-controller"} == 0
      for: 2m
      labels:
        severity: critical
        component: controller
      annotations:
        summary: "LLMKube controller is down"
        description: "Controller {{`{{ $labels.instance }}`}} has been down for more than 2 minutes"

    {{- if .Values.prometheus.serviceMonitor.enabled }}
    # up{} == 0 needs the series to exist; a stale job label removes it
    # instead, which is how #1223 stayed silent. Gated on the chart owning
    # the scrape target.
    - alert: ControllerMetricsMissing
      expr: absent(up{job="llmkube-controller"})
      for: 15m
      labels:
        severity: warning
        component: controller
      annotations:
        summary: "LLMKube controller metrics are not being scraped"
        description: "No up series for job=llmkube-controller for 15 minutes — the scrape target is gone, or its job label no longer matches ControllerDown."
    {{- end }}

  - name: llmkube-inference-recording
    interval: 30s
    rules:
    # Request latency p95 over 5m. vLLM-only: llama.cpp's server exposes 11
    # metrics and none of them is a request-latency histogram.
    - record: llmkube:inference:request_latency:p95_5m
      expr: |
        histogram_quantile(0.95,
          sum by (service, namespace, runtime, le) (
            rate(vllm:e2e_request_latency_seconds_bucket[5m])
          )
        )
      labels:
        latency_kind: end_to_end

    # Inference pod restart rate as a coarse error proxy. Per-request
    # 4xx/5xx counters are tracked in #409 and will replace this once the
    # upstream metric paths are confirmed for each runtime.
    #
    # Alternation is every backend's ContainerName(), enforced by
    # TestChartRestartRuleCoversEveryBackend. Keyed by pod because
    # kube-state-metrics carries no service or runtime label.
    - record: llmkube:inference:restarts:rate5m
      expr: |
        sum by (namespace, pod, container) (
          rate(kube_pod_container_status_restarts_total{
            container=~"llama-server|sglang|vllm|tgi|personaplex|inference-server"
          }[5m])
        )

    # TTFT p95 over 5m. vLLM-only; llama.cpp has no first-token histogram.
    - record: llmkube:inference:ttft_seconds:p95_5m
      expr: histogram_quantile(0.95, sum by (service, namespace, runtime, le) (rate(vllm:time_to_first_token_seconds_bucket[5m])))
      labels:
        latency_kind: ttft
  {{- end }}
{{- end }}
