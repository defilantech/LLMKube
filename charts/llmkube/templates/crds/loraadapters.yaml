{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: loraadapters.inference.llmkube.dev
spec:
  group: inference.llmkube.dev
  names:
    kind: LoRAAdapter
    listKind: LoRAAdapterList
    plural: loraadapters
    shortNames:
    - lora
    singular: loraadapter
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.inferenceServiceRef.name
      name: Service
      type: string
    - jsonPath: .spec.name
      name: Adapter
      type: string
    - jsonPath: .status.conditions[?(@.type=="Loaded")].status
      name: Loaded
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LoRAAdapter is the Schema for the loraadapters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LoRAAdapter
            properties:
              inferenceServiceRef:
                description: |-
                  InferenceServiceRef names the InferenceService this adapter should
                  be loaded into. The reconciler resolves it; if it points at a
                  non-sglang runtime, Available=False with reason RuntimeMismatch.
                properties:
                  name:
                    description: |-
                      Name is the name of the target InferenceService. Must exist in
                      Namespace (or be omitted to default to this resource's namespace).
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the target InferenceService. When
                      omitted, defaults to the LoRAAdapter's namespace. Cross-namespace
                      references are allowed; the controller only requires that the
                      operator has RBAC to GET the referenced InferenceService.
                    type: string
                required:
                - name
                type: object
              name:
                description: |-
                  Name is the SGLang-side adapter handle. Operators quote this in
                  inference requests to pick the adapter. Must be unique within the
                  target InferenceService's loaded set; the SGLang HTTP API rejects
                  duplicates with 409.
                maxLength: 63
                minLength: 1
                pattern: ^[A-Za-z0-9][A-Za-z0-9._-]*$
                type: string
              path:
                description: |-
                  Path is the path on disk inside the SGLang container where the
                  adapter weights are mounted. SGLang reads from this path when
                  /v1/lora_adapters/load is invoked, so it must be reachable from
                  the inference pod (typically via a PVC exposed in
                  InferenceService.spec.extraVolumes) at the path the operator
                  chose. The controller does not auto-mount.
                minLength: 1
                type: string
            required:
            - inferenceServiceRef
            - name
            - path
            type: object
          status:
            description: status defines the observed state of LoRAAdapter
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the LoRAAdapter
                  resource.

                  Standard condition types include:
                  - "Available": the spec is well-formed and target InferenceService
                    exists with runtime == sglang.
                  - "Loaded": the adapter has been POSTed to SGLang and SGLang
                    reported success (or, on teardown, acknowledged the unload).
                  - "Error": a reconcile step failed; the message carries the
                    underlying reason (runtime mismatch, HTTP failure, etc.).

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastLoadedAt:
                description: |-
                  LastLoadedAt is when the adapter was last successfully loaded
                  into SGLang. Re-loads (after a SGLang pod restart, for example)
                  update this field.
                format: date-time
                type: string
              loadedPath:
                description: |-
                  LoadedPath is the path SGLang has accepted for this adapter. Set
                  after a successful POST /v1/lora_adapters/load response. Empty
                  before the first successful load.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
