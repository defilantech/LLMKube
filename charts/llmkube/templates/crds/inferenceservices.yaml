            properties:
              affinity:
                description: |-
                  Affinity constrains inference Pod placement (node/pod affinity and
                  anti-affinity). Passthrough to the Pod spec, for finer control than
                  NodeSelector — e.g. preferring or avoiding nodes already running other
                  GPU workloads.
