{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: gpuquotas.inference.llmkube.dev
spec:
  group: inference.llmkube.dev
  names:
    kind: GPUQuota
    listKind: GPUQuotaList
    plural: gpuquotas
    shortNames:
    - gq
    singular: gpuquota
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.gpuCount
      name: GPU Count
      type: integer
    - jsonPath: .status.usedGPUCount
      name: Used GPUs
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GPUQuota is the Schema for the gpuquotas API. It declares a multi-tenant
          GPU budget that admission logic enforces against InferenceService pods.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GPUQuotaSpec defines the desired state of GPUQuota. Exactly one of
              Selector or NamespaceRef must be set; they are mutually exclusive.
              Selector targets pods by label across one or more namespaces;
              NamespaceRef pins the quota to a single namespace.
            properties:
              costBudgetRef:
                description: |-
                  CostBudgetRef is the name of a CostBudget resource (future CRD)
                  that caps the dollar cost of GPU usage under this quota.
                type: string
              gpuCount:
                description: GPUCount is the maximum number of GPUs this quota allows.
                format: int32
                minimum: 0
                type: integer
              minPriority:
                description: |-
                  MinPriority is the minimum scheduling priority a pod must declare
                  to be admitted under this quota. Pods with a lower priority are
                  denied regardless of available headroom.
                enum:
                - critical
                - high
                - normal
                - low
                - batch
                type: string
              namespaceRef:
                description: |-
                  NamespaceRef pins this quota to a single namespace.
                  Mutually exclusive with Selector.
                type: string
              selector:
                description: |-
                  Selector matches pods by label across one or more namespaces.
                  Mutually exclusive with NamespaceRef.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              vramBytes:
                description: |-
                  VRAMBytes is the maximum total VRAM (bytes) this quota allows.
                  Zero means no VRAM cap.
                format: int64
                minimum: 0
                type: integer
            required:
            - gpuCount
            type: object
            x-kubernetes-validations:
            - message: exactly one of selector or namespaceRef must be set
              rule: has(self.selector) != has(self.namespaceRef)
          status:
            description: GPUQuotaStatus defines the observed state of GPUQuota.
            properties:
              admissionDenials:
                description: AdmissionDenials is the cumulative count of pods denied
                  by this quota.
                format: int64
                type: integer
              lastDenial:
                description: LastDenial is the timestamp of the most recent admission
                  denial.
                format: date-time
                type: string
              usedGPUCount:
                description: UsedGPUCount is the number of GPUs currently allocated
                  under this quota.
                format: int32
                type: integer
              usedVRAMBytes:
                description: UsedVRAMBytes is the total VRAM (bytes) currently allocated
                  under this quota.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
