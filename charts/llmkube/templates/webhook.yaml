{{- if .Values.webhook.enabled }}
{{- /*
Compute the serving cert + CA bundle ONCE so the Secret and the
ValidatingWebhookConfiguration below are guaranteed to use matching material.
llmkube.webhook.certs reuses the existing Secret on upgrade (lookup-reuse), so
the cert stays stable and the injected caBundle never drifts from the served
cert.
*/}}
{{- $certs := include "llmkube.webhook.certs" . | fromYaml }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llmkube.webhook.secretName" . }}
  namespace: {{ include "llmkube.namespace" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $certs.cert }}
  tls.key: {{ $certs.key }}
  ca.crt: {{ $certs.ca }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmkube.webhook.serviceName" . }}
  namespace: {{ include "llmkube.namespace" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "llmkube.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "llmkube.webhook.configName" . }}
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
webhooks:
  - name: vmodelrouter.inference.llmkube.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    clientConfig:
      service:
        name: {{ include "llmkube.webhook.serviceName" . }}
        namespace: {{ include "llmkube.namespace" . }}
        path: /validate-inference-llmkube-dev-v1alpha1-modelrouter
      caBundle: {{ $certs.ca }}
    rules:
      - apiGroups: ["inference.llmkube.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["modelrouters"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "llmkube.webhook.configName" . }}-mutating
  labels:
    {{- include "llmkube.labels" . | nindent 4 }}
webhooks:
  - name: mmodel.inference.llmkube.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # Ignore: accelerator normalization is cosmetic (#1074); a Model apply must
    # never be blocked because the defaulter is unreachable.
    failurePolicy: Ignore
    clientConfig:
      service:
        name: {{ include "llmkube.webhook.serviceName" . }}
        namespace: {{ include "llmkube.namespace" . }}
        path: /mutate-inference-llmkube-dev-v1alpha1-model
      caBundle: {{ $certs.ca }}
    rules:
      - apiGroups: ["inference.llmkube.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["models"]
        scope: Namespaced
{{- end }}
