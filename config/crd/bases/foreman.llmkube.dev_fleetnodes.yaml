---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fleetnodes.foreman.llmkube.dev
spec:
  group: foreman.llmkube.dev
  names:
    kind: FleetNode
    listKind: FleetNodeList
    plural: fleetnodes
    shortNames:
    - fn
    singular: fleetnode
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.capability.accelerator
      name: Accelerator
      type: string
    - jsonPath: .status.capability.availableRAMGB
      name: RAM
      type: integer
    - jsonPath: .status.currentTask
      name: Current Task
      type: string
    - jsonPath: .status.lastHeartbeatTime
      name: Heartbeat
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FleetNode is a worker the Foreman scheduler can dispatch tasks to. It is
          cluster-scoped because nodes are global to the fleet; the resource is
          owned and updated by the FleetAgent running on that node.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the small bit of identity the agent owns.
            properties:
              nodeName:
                description: |-
                  NodeName is the human-readable identity of the worker. Conventionally
                  matches metadata.name; required for the scheduler to address it.
                type: string
              roles:
                description: |-
                  Roles label the node for capability-aware scheduling beyond raw
                  accelerator type. Conventionally one or more of: "worker", "verifier".
                items:
                  type: string
                type: array
              tailscaleAddr:
                description: |-
                  TailscaleAddr is the Tailscale address (IP or MagicDNS name) the
                  FleetAgent listens on. Optional; the operator does not connect to the
                  agent directly in v0.1 (dispatch is via the agent's CRD watch).
                type: string
            required:
            - nodeName
            type: object
          status:
            description: |-
              status is the agent's heartbeat-driven view of its host. The
              scheduler reads it; the agent writes it.
            properties:
              capability:
                description: Capability is what this node advertises to the scheduler.
                properties:
                  accelerator:
                    description: Accelerator names the accelerator family available
                      on this node.
                    enum:
                    - metal
                    - cuda
                    - none
                    type: string
                  availableRAMGB:
                    description: |-
                      AvailableRAMGB is the FleetAgent's estimate of RAM not currently
                      committed to a running model or task. Refreshed on heartbeat.
                    format: int32
                    minimum: 0
                    type: integer
                  installedModels:
                    description: |-
                      InstalledModels is the list of Model CR names this node has locally
                      available (the model files are present and the runtime can load them).
                    items:
                      type: string
                    type: array
                  maxContextTokens:
                    description: |-
                      MaxContextTokens is the largest context window the loaded model
                      supports. Used by the scheduler to filter tasks with high
                      MinContextTokens requirements.
                    format: int32
                    minimum: 0
                    type: integer
                  tokensPerSecond:
                    description: |-
                      TokensPerSecond is a coarse decode throughput estimate. v0.1 takes
                      this from configuration; v0.2 will benchmark on heartbeat.
                    format: int32
                    minimum: 0
                    type: integer
                  totalRAMGB:
                    description: TotalRAMGB is the physical RAM in GiB.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              conditions:
                description: 'Conditions track standard health signals: Ready, Draining,
                  etc.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentTask:
                description: |-
                  CurrentTask is the namespaced name of the AgenticTask the agent is
                  running, or empty if idle. The scheduler skips nodes with a non-empty
                  CurrentTask (v0.1 concurrency is one task per node).
                type: string
              lastHeartbeatTime:
                description: |-
                  LastHeartbeatTime is the most recent heartbeat the FleetAgent
                  successfully patched. The reconciler marks the phase NotReady if
                  this stalls (default threshold: 90 seconds).
                format: date-time
                type: string
              phase:
                description: |-
                  Phase is the heartbeat-driven health state. The scheduler treats
                  only Ready nodes as eligible.
                enum:
                - Ready
                - Draining
                - NotReady
                - Unknown
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
