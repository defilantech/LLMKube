# Foreman gate Job. The run_gate_job tool renders this template with
# Go text/template and submits the result via controller-runtime client.
# Matches the autofix gate template at ~/autofix/k8s/gate-job.template.yaml
# in shape: same image, same cache mounts, same exit-code semantics, but
# parameterized for any (repo, branch) and any check list.
#
# Template fields:
#   .Name           -- Job name, e.g. foreman-gate-<task>-<8-char-suffix>
#   .Namespace      -- the namespace the Job runs in (foreman-system in
#                      production; the tool's Namespace field at runtime)
#   .Image          -- container image (default: golang:1.26)
#   .Repo           -- "owner/name", inlined verbatim into the clone URL
#   .Branch         -- branch on the fork to clone shallowly
#   .Checks         -- list of make targets to run, in order
#   .BiteCheck      -- when true, run the bite check after standard checks
#   .PVCName        -- "foreman-gate-cache" PVC for GOMODCACHE/GOCACHE/XDG
#   .ActiveDeadlineSeconds -- max wall-clock for the Job
#   .TTLSecondsAfterFinished -- how long the Job's resources linger so
#                      callers can fetch logs
#   .CPURequest / .CPULimit / .MemRequest / .MemLimit
#   .CloneURLBase   -- "https://github.com" (override for fork-style
#                      hosts; the default matches autofix)
#   .CloneURL       -- optional. When non-empty, the Job clones this
#                      URL verbatim and ignores .CloneURLBase / .Repo
#                      for the clone command (the log line still names
#                      .Repo for operator readability). Used by the v0.1
#                      gate to clone from the foreman-agent's --git-
#                      remote-url (the fork) rather than upstream.
#   .TaskNamespace / .TaskName -- the AgenticTask that owns this Job;
#                                 surfaced as labels for observability.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: foreman-gate
    app.kubernetes.io/managed-by: foreman-agent
    foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
    foreman.llmkube.dev/task-name: {{ .TaskName }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .ActiveDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .TTLSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman-gate
        foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
        foreman.llmkube.dev/task-name: {{ .TaskName }}
    spec:
      restartPolicy: Never
      containers:
        - name: gate
          image: {{ .Image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              echo "=== clone {{ .Repo }} @ {{ .Branch }} ==="
              git clone --depth 1 --branch "{{ .Branch }}" \
                "{{ if .CloneURL }}{{ .CloneURL }}{{ else }}{{ .CloneURLBase }}/{{ .Repo }}.git{{ end }}" /work || { echo "GATE FAIL: clone"; exit 1; }
              cd /work
              rc=0
              {{- range .Checks }}
              echo "=== make {{ . }} ==="; make {{ . }} || rc=1
              {{- end }}
              if ! git diff --quiet; then
                echo "GATE FAIL: tree dirty after checks (unformatted or stale codegen)"
                git diff --stat
                rc=1
              fi
              {{- if .BiteCheck }}
              # Bite check: verify new/changed tests actually fail against
              # pre-change production code. Skipped if no test files changed.
              # Errors surface as GATE-ERROR (fail loud).
              echo "=== bite check ==="
              test_files=$(git status --porcelain | grep '_test\.go$' | awk '{print $NF}')
              if [ -z "$test_files" ]; then
                echo "bite check: no test files changed, skipping"
              else
                # Identify production .go files that changed (added or modified).
                # Both are handled by the scoped stash below.
                prod_files=$(git status --porcelain | grep '\.go$' | grep -v '_test\.go$' | awk '{print $NF}')
                if [ -z "$prod_files" ]; then
                  echo "bite check: no production files changed, skipping"
                else
                  # Revert ONLY the production files, keeping the coder's new
                  # test changes in the working tree. A scoped stash push
                  # reverts tracked prod to HEAD and removes untracked/added
                  # prod (via -u), but leaves the changed _test.go files alone,
                  # so the tests run below are the NEW tests against pre-change
                  # production (the whole point). Stashing everything would
                  # revert the new tests too and falsely flag them non-biting.
                  # git stash pop restores production afterward.
                  git stash push -u -- $prod_files || { echo "GATE-ERROR: bite check stash failed"; exit 1; }
                  # Rebuild and run tests against reverted production code.
                  echo "bite check: running tests against reverted production code"
                  if ! go build ./...; then
                    echo "bite check: build failed against reverted production (expected for some changes)"
                  fi
                  bite_rc=0
                  go test -count=1 -timeout=180s ./... || bite_rc=1
                  if [ "$bite_rc" -eq 0 ]; then
                    echo "GATE FAIL: bite check: tests pass against pre-change production (non-biting test)"
                    rc=1
                  else
                    echo "bite check: tests fail against pre-change production (biting test, good)"
                  fi
                  # Restore the original state.
                  git stash pop || { echo "GATE-ERROR: bite check restore failed"; exit 1; }
                fi
              fi
              {{- end }}
              [ "$rc" -eq 0 ] && echo "GATE PASS" || echo "GATE FAIL"
              exit "$rc"
          env:
            - name: BRANCH
              value: "{{ .Branch }}"
            - name: GOMODCACHE
              value: /cache/gomod
            - name: GOCACHE
              value: /cache/gobuild
            - name: XDG_DATA_HOME
              value: /cache/xdg
          volumeMounts:
            - name: cache
              mountPath: /cache
          resources:
            requests:
              cpu: "{{ .CPURequest }}"
              memory: {{ .MemRequest }}
            limits:
              cpu: "{{ .CPULimit }}"
              memory: {{ .MemLimit }}
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .PVCName }}
