# Foreman gate Job. The run_gate_job tool renders this template with
# Go text/template and submits the result via controller-runtime client.
# Matches the autofix gate template at ~/autofix/k8s/gate-job.template.yaml
# in shape: same image, same cache mounts, same exit-code semantics, but
# parameterized for any (repo, branch) and any check list.
#
# Template fields:
#   .Name           -- Job name, e.g. foreman-gate-<task>-<8-char-suffix>
#   .Namespace      -- the namespace the Job runs in (foreman-system in
#                      production; the tool's Namespace field at runtime)
#   .Image          -- container image (default: golang:1.26)
#   .Repo           -- "owner/name", inlined verbatim into the clone URL
#   .Branch         -- branch on the fork to clone shallowly
#   .Checks         -- list of make targets to run, in order
#   .PVCName        -- "foreman-gate-cache" PVC for GOMODCACHE/GOCACHE/XDG
#   .ActiveDeadlineSeconds -- max wall-clock for the Job
#   .TTLSecondsAfterFinished -- how long the Job's resources linger so
#                      callers can fetch logs
#   .CPURequest / .CPULimit / .MemRequest / .MemLimit
#   .CloneURLBase   -- "https://github.com" (override for fork-style
#                      hosts; the default matches autofix)
#   .CloneURL       -- optional. When non-empty, the Job clones this
#                      URL verbatim and ignores .CloneURLBase / .Repo
#                      for the clone command (the log line still names
#                      .Repo for operator readability). Used by the v0.1
#                      gate to clone from the foreman-agent's --git-
#                      remote-url (the fork) rather than upstream.
#   .TaskNamespace / .TaskName -- the AgenticTask that owns this Job;
#                                 surfaced as labels for observability.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: foreman-gate
    app.kubernetes.io/managed-by: foreman-agent
    foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
    foreman.llmkube.dev/task-name: {{ .TaskName }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .ActiveDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .TTLSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman-gate
        foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
        foreman.llmkube.dev/task-name: {{ .TaskName }}
    spec:
      restartPolicy: Never
      containers:
        - name: gate
          image: {{ .Image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              echo "=== clone {{ .Repo }} @ {{ .Branch }} ==="
              git clone --depth 1 --branch "{{ .Branch }}" \
                "{{ if .CloneURL }}{{ .CloneURL }}{{ else }}{{ .CloneURLBase }}/{{ .Repo }}.git{{ end }}" /work || { echo "GATE FAIL: clone"; exit 1; }
              cd /work
              rc=0
              {{- range .Checks }}
              echo "=== make {{ . }} ==="; make {{ . }} || rc=1
              {{- end }}
              if ! git diff --quiet; then
                echo "GATE FAIL: tree dirty after checks (unformatted or stale codegen)"
                git diff --stat
                rc=1
              fi
              [ "$rc" -eq 0 ] && echo "GATE PASS" || echo "GATE FAIL"
              exit "$rc"
          env:
            - name: BRANCH
              value: "{{ .Branch }}"
            - name: GOMODCACHE
              value: /cache/gomod
            - name: GOCACHE
              value: /cache/gobuild
            - name: XDG_DATA_HOME
              value: /cache/xdg
          volumeMounts:
            - name: cache
              mountPath: /cache
          resources:
            requests:
              cpu: "{{ .CPURequest }}"
              memory: {{ .MemRequest }}
            limits:
              cpu: "{{ .CPULimit }}"
              memory: {{ .MemLimit }}
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .PVCName }}
