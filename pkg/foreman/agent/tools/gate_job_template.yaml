# Foreman gate Job. The run_gate_job tool renders this template with
# Go text/template and submits the result via controller-runtime client.
# Matches the autofix gate template at ~/autofix/k8s/gate-job.template.yaml
# in shape: same image, same cache mounts, same exit-code semantics, but
# parameterized for any (repo, branch) and any check list.
#
# Template fields:
#   .Name           -- Job name, e.g. foreman-gate-<task>-<8-char-suffix>
#   .Namespace      -- the namespace the Job runs in (foreman-system in
#                      production; the tool's Namespace field at runtime)
#   .Image          -- container image (default: golang:1.26)
#   .Repo           -- "owner/name", inlined verbatim into the clone URL
#   .Branch         -- branch on the fork to clone shallowly
#   .BaseBranch     -- base branch the coder branch was cut from (default
#                      "main"); the bite check diffs against and reverts to
#                      the MERGE-BASE of HEAD and this ref (fetched from
#                      .UpstreamURL when set, otherwise from origin), not
#                      the ref tip, so a stale fork base can never
#                      manufacture failures (#1259).
#   .UpstreamURL    -- optional. Canonical repo clone URL the bite check
#                      fetches .BaseBranch from. When empty, the bite check
#                      falls back to fetching .BaseBranch from origin (the
#                      fork), the pre-#1259 behavior. Any infra anomaly in
#                      base resolution (fetch failure, no merge-base, an
#                      implausibly large diff) is a loud GATE-WARN skip,
#                      never a gate failure.
#   .Checks         -- list of make targets to run, in order
#   .BiteCheck      -- when true, run the bite check after standard checks
#   .PVCName        -- "foreman-gate-cache" PVC for GOMODCACHE/GOCACHE/XDG
#   .ActiveDeadlineSeconds -- max wall-clock for the Job
#   .TTLSecondsAfterFinished -- how long the Job's resources linger so
#                      callers can fetch logs
#   .CPURequest / .CPULimit / .MemRequest / .MemLimit
#   .CloneURLBase   -- "https://github.com" (override for fork-style
#                      hosts; the default matches autofix)
#   .CloneURL       -- optional. When non-empty, the Job clones this
#                      URL verbatim and ignores .CloneURLBase / .Repo
#                      for the clone command (the log line still names
#                      .Repo for operator readability). Used by the v0.1
#                      gate to clone from the foreman-agent's --git-
#                      remote-url (the fork) rather than upstream.
#   .TaskNamespace / .TaskName -- the AgenticTask that owns this Job;
#                                 surfaced as labels for observability.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: foreman-gate
    app.kubernetes.io/managed-by: foreman-agent
    foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
    foreman.llmkube.dev/task-name: {{ .TaskName }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .ActiveDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .TTLSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman-gate
        foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
        foreman.llmkube.dev/task-name: {{ .TaskName }}
    spec:
      restartPolicy: Never
      # fsGroup makes the RWX gate-cache PVC group-writable so non-root
      # gate images (e.g. USER 65534) can write under XDG_DATA_HOME=/cache/xdg.
      # Without it the PVC mounts root:root and any XDG-aware tool crashes
      # before the real checks run (#1055). 100 matches the gate image's
      # typical build-group GID; operators pinning a different group should
      # override via the gate's image build.
      securityContext:
        fsGroup: 100
      containers:
        - name: gate
          image: {{ .Image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              echo "=== clone {{ .Repo }} @ {{ .Branch }} ==="
              git clone --depth 1 --branch "{{ .Branch }}" \
                "{{ if .CloneURL }}{{ .CloneURL }}{{ else }}{{ .CloneURLBase }}/{{ .Repo }}.git{{ end }}" /work || { echo "GATE FAIL: clone"; exit 1; }
              cd /work
              rc=0
              {{- if .Generic }}
              {{- range .Commands }}
              echo "=== {{ . }} ==="; ( {{ . }} ) || rc=1
              {{- end }}
              {{- else }}
              {{- range .Checks }}
              echo "=== make {{ . }} ==="; make {{ . }} || rc=1
              {{- end }}
              if ! git diff --quiet; then
                echo "GATE FAIL: tree dirty after checks (unformatted or stale codegen)"
                git diff --stat
                rc=1
              fi
              {{- if .BiteCheck }}
              # Bite check: verify new/changed tests actually fail against pre-change
              # production code. The gate Job clones the coder branch as a shallow,
              # single-branch checkout (everything is committed, working tree is
              # clean), so change detection works on the committed diff against the
              # base branch, NOT on `git status`. Infra anomalies (base ref will not
              # resolve, no merge-base found, a bogus base blowing up the diff size)
              # are a loud skip (GATE-WARN), never a gate failure: only a genuine
              # non-biting test result blocks the gate (#1259).
              BASE="${BASE_BRANCH:-main}"
              echo "=== bite check (base=$BASE) ==="
              bite_skip() { echo "GATE-WARN: bite check skipped ($1)"; }
              MB=""
              if [ -n "${UPSTREAM_URL:-}" ]; then
                # Fetch the base from the CANONICAL repo, not the fork: the fork
                # $BASE can be arbitrarily stale, and reverting production to a stale
                # tip manufactures compile failures in packages the coder never
                # touched (#1259). The coder branched from the upstream base (#813),
                # so merge-base(HEAD, upstream base) IS the coder's true fork point.
                # The `--` end-of-options guard keeps a crafted URL starting
                # with `-` from being read as a git option (argv smuggling).
                if ! git fetch --depth 100 -- "$UPSTREAM_URL" "+refs/heads/$BASE:refs/remotes/ubase/$BASE" >/dev/null 2>&1; then
                  bite_skip "could not fetch $BASE from upstream"
                else
                  # The clone is shallow; deepen until the histories connect. Two
                  # rounds is plenty for any sane coder branch; beyond that the base
                  # resolution is suspect and the bite is skipped, never failed.
                  MB=$(git merge-base HEAD "refs/remotes/ubase/$BASE" 2>/dev/null || true)
                  if [ -z "$MB" ]; then
                    git fetch --deepen=1000 origin "$BRANCH" >/dev/null 2>&1 || true
                    git fetch --deepen=1000 -- "$UPSTREAM_URL" "+refs/heads/$BASE:refs/remotes/ubase/$BASE" >/dev/null 2>&1 || true
                    MB=$(git merge-base HEAD "refs/remotes/ubase/$BASE" 2>/dev/null || true)
                  fi
                  [ -z "$MB" ] && bite_skip "no merge-base between HEAD and upstream $BASE after deepening"
                fi
              else
                # No upstream URL (freeform task without a repo slug): pre-#1259
                # behavior, fetch the base ref from origin and use its tip.
                if ! git fetch --depth 1 origin "+refs/heads/$BASE:refs/remotes/origin/$BASE" >/dev/null 2>&1; then
                  bite_skip "could not fetch base ref origin/$BASE"
                elif ! git rev-parse --verify --quiet "origin/$BASE" >/dev/null; then
                  bite_skip "base ref origin/$BASE did not resolve after fetch"
                else
                  MB="origin/$BASE"
                fi
              fi
              if [ -n "$MB" ]; then
                changed=$(git diff --name-only "$MB" HEAD)
                nchanged=$(printf '%s\n' "$changed" | sed '/^$/d' | wc -l | tr -d ' ')
                if [ "$nchanged" -gt 200 ]; then
                  # A coder diff is tens of files at most. Hundreds means the base
                  # resolution is wrong (the #1259 incident swept 103 commits of
                  # drift); skipping is honest, failing would blame the coder.
                  bite_skip "diff vs merge-base names $nchanged files; base resolution suspect"
                else
                  test_files=$(printf '%s\n' "$changed" | grep '_test\.go$' || true)
                  prod_files=$(printf '%s\n' "$changed" | grep '\.go$' | grep -v '_test\.go$' || true)
                  if [ -z "$test_files" ]; then
                    echo "bite check: no test files changed, skipping"
                  elif [ -z "$prod_files" ]; then
                    echo "bite check: no production files changed, skipping"
                  else
                    bite_err=0
                    for f in $prod_files; do
                      if git cat-file -e "$MB:$f" 2>/dev/null; then
                        git checkout "$MB" -- "$f" || { bite_skip "revert failed for $f"; bite_err=1; break; }
                      else
                        rm -f "$f" || { bite_skip "could not remove added prod file $f"; bite_err=1; break; }
                      fi
                    done
                    if [ "$bite_err" -eq 0 ]; then
                      test_pkgs=$(echo "$test_files" | xargs -n1 dirname | sort -u | sed 's;^;./;')
                      echo "bite check: running changed test packages against reverted production: $test_pkgs"
                      bite_rc=0
                      go test -count=1 -timeout=180s $test_pkgs || bite_rc=1
                      git checkout HEAD -- $prod_files || bite_skip "restore failed; tree left reverted (all standard checks already ran)"
                      if [ "$bite_rc" -eq 0 ]; then
                        echo "GATE FAIL: bite check: tests pass against pre-change production (non-biting test)"
                        rc=1
                      else
                        echo "bite check: tests fail against pre-change production (biting test, good)"
                      fi
                    else
                      git checkout HEAD -- $prod_files >/dev/null 2>&1 || true
                    fi
                  fi
                fi
              fi
              {{- end }}
              {{- end }}
              [ "$rc" -eq 0 ] && echo "GATE PASS" || echo "GATE FAIL"
              exit "$rc"
          env:
            - name: BRANCH
              value: "{{ .Branch }}"
            - name: BASE_BRANCH
              value: "{{ .BaseBranch }}"
            - name: UPSTREAM_URL
              value: "{{ .UpstreamURL }}"
            # The base image (golang:1.26) bakes GOTOOLCHAIN=local, which
            # refuses to run when go.mod's toolchain floor is newer than the
            # image's Go (e.g. go.mod requires 1.26.5 but the cached
            # golang:1.26 tag is still 1.26.4). Force `auto` so the gate
            # downloads whatever toolchain go.mod requires into the persistent
            # GOMODCACHE below, keeping the gate immune to go.mod patch bumps.
            - name: GOTOOLCHAIN
              value: auto
            - name: GOMODCACHE
              value: /cache/gomod
            - name: GOCACHE
              value: /cache/gobuild
            - name: XDG_DATA_HOME
              value: /cache/xdg
          volumeMounts:
            - name: cache
              mountPath: /cache
          resources:
            requests:
              cpu: "{{ .CPURequest }}"
              memory: {{ .MemRequest }}
            limits:
              cpu: "{{ .CPULimit }}"
              memory: {{ .MemLimit }}
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .PVCName }}
