# Foreman coder Job. The run_coder_job submitter renders this template
# with Go text/template and submits the result via the controller-runtime
# client. It mirrors gate_job_template.yaml in shape (same poll + log-tail
# contract) but runs the foreman-agent binary's `run-task` subcommand
# instead of `make <checks>`, and uses a local emptyDir workspace rather
# than the gate's shared cache PVC: a coder Job clones into its own pod and
# discards the tree on exit, so there is nothing to share across runs.
#
# The container runs `foreman-agent run-task`, which calls
# NativeAgentLoopExecutor.Execute IN-PROCESS (the Job IS the execution;
# run-task never wires a CoderJobSubmitter, so it cannot recurse into
# another Job). run-task emits the structured result on stdout as a
# FOREMAN-RESULT JSON line plus a sentinel line; run_coder_job parses
# those out of the pod log tail.
#
# Template fields:
#   .Name           -- Job name, e.g. foreman-coder-<task>-<unix-ms>
#   .Namespace      -- namespace the Job runs in (foreman-system in prod)
#   .Image          -- per-task image: foreman-agent + toolchain. From the
#                      Agent's spec.execution.image.
#   .TaskName / .TaskNamespace -- the AgenticTask to run; passed to
#                      run-task as --task / --namespace and surfaced as
#                      labels for observability.
#   .ServiceAccountName -- least-privilege SA for the pod (optional).
#   .ActiveDeadlineSeconds -- max wall-clock for the Job.
#   .TTLSecondsAfterFinished -- how long resources linger for log fetch.
#   .CPURequest / .CPULimit / .MemRequest / .MemLimit
#   .GitCredentialsSecret -- name of a Secret holding the GitHub token for
#                      the clone + push. Projected as the GITHUB_TOKEN env
#                      var (which the run-task body reads via
#                      repo.TokenFromEnvOrFile) AND mounted as a file at
#                      /secrets/git for callers that prefer a file. The env
#                      var is the wiring the body actually reads; the mount
#                      is left in place for forward compatibility. The
#                      secretKeyRef is optional, so the pod still starts
#                      when the Secret is absent (public repos take the
#                      graceful no-token path; the fork push needs it).
#   .GitCredentialsSecretKey -- key within that Secret holding the token.
#                      Defaults to "token".
#   .ModelAuthSecret -- optional. When set, mounts a Secret at
#                      /secrets/model for the remote model endpoint auth
#                      (e.g. a bearer token). Omitted when empty.
#   .GitRemoteURL    -- optional. git URL run-task clones from + pushes to,
#                      passed as --git-remote-url. Omitted when empty so the
#                      Job never receives a bare --git-remote-url= (coder
#                      tasks that need it then fail with
#                      GitRemoteNotConfigured rather than parsing an empty
#                      URL); gate-only installs have no remote.
#   .CommitAuthorName / .CommitAuthorEmail -- optional. git author +
#                      committer identity, passed as --commit-author-name /
#                      --commit-author-email. Each omitted when empty.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Name }}
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: foreman-coder
    app.kubernetes.io/managed-by: foreman-agent
    foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
    foreman.llmkube.dev/task-name: {{ .TaskName }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .ActiveDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .TTLSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: foreman-coder
        foreman.llmkube.dev/task-namespace: {{ .TaskNamespace }}
        foreman.llmkube.dev/task-name: {{ .TaskName }}
    spec:
      restartPolicy: Never
      {{- if .ServiceAccountName }}
      serviceAccountName: {{ .ServiceAccountName }}
      {{- end }}
      containers:
        - name: coder
          image: {{ .Image }}
          command: ["foreman-agent"]
          args:
            - run-task
            - --task
            - {{ .TaskName }}
            - --namespace
            - {{ .TaskNamespace }}
            - --workspace-dir
            - /workspace
            {{- if .GitRemoteURL }}
            - --git-remote-url={{ .GitRemoteURL }}
            {{- end }}
            {{- if .CommitAuthorName }}
            - --commit-author-name={{ .CommitAuthorName }}
            {{- end }}
            {{- if .CommitAuthorEmail }}
            - --commit-author-email={{ .CommitAuthorEmail }}
            {{- end }}
          env:
            # The run-task body resolves git auth via
            # repo.TokenFromEnvOrFile, which reads $GITHUB_TOKEN. Project
            # it from the git Secret so the in-pod clone + push can
            # authenticate. optional: true keeps the pod startable when the
            # Secret is absent (public-repo / no-push runs); the fork push
            # then fails cleanly with ErrNoToken rather than the pod never
            # starting. Model-endpoint auth (the in-cluster InferenceService
            # is unauthenticated today) is a follow-up; external / cloud-
            # proxy model auth wiring is not plumbed here yet.
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .GitCredentialsSecret }}
                  key: {{ .GitCredentialsSecretKey }}
                  optional: true
            - name: GOMODCACHE
              value: /workspace/.cache/gomod
            - name: GOCACHE
              value: /workspace/.cache/gobuild
            - name: XDG_DATA_HOME
              value: /workspace/.cache/xdg
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: git-credentials
              mountPath: /secrets/git
              readOnly: true
            {{- if .ModelAuthSecret }}
            - name: model-auth
              mountPath: /secrets/model
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: "{{ .CPURequest }}"
              memory: {{ .MemRequest }}
            limits:
              cpu: "{{ .CPULimit }}"
              memory: {{ .MemLimit }}
      volumes:
        - name: workspace
          emptyDir: {}
        - name: git-credentials
          secret:
            secretName: {{ .GitCredentialsSecret }}
            optional: true
        {{- if .ModelAuthSecret }}
        - name: model-auth
          secret:
            secretName: {{ .ModelAuthSecret }}
            optional: true
        {{- end }}
