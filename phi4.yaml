apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma4
  namespace: llmkube-system
spec:
  source: https://huggingface.co/Jiunsong/supergemma4-26b-uncensored-gguf-v2/resolve/main/supergemma4-26b-uncensored-fast-v2-Q4_K_M.gguf
  format: gguf
  hardware:
    accelerator: intel
    gpu:
      enabled: true
      count: 1
      vendor: intel
      layers: -1
  resources:
    cpu: "2"
    memory: "4Gi"
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma4
  namespace: llmkube-system
spec:
  modelRef: gemma4
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-intel
  priorityClassName: llmkube-llmkube-normal
  resources:
    gpu: 1
    cpu: "6"
    memory: "20Gi"
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
